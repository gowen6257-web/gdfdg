<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>时间气球 - Time Balloon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a1a;
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #0f0f23 0%, #1a1a3e 50%, #16213e 100%);
            overflow: hidden;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #windIndicator {
            position: absolute;
            top: max(12px, env(safe-area-inset-top));
            left: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        #windArrow {
            font-size: 28px;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: inline-block;
            filter: drop-shadow(0 0 8px rgba(100, 200, 255, 0.4));
        }
        
        #windText {
            color: rgba(255,255,255,0.7);
            font-size: clamp(11px, 3vw, 13px);
            font-weight: bold;
        }
        
        #windLabel {
            font-size: 9px;
            color: rgba(255,255,255,0.4);
        }
        
        #speedDisplay {
            position: absolute;
            top: max(12px, env(safe-area-inset-top));
            right: 15px;
            text-align: right;
        }
        
        #speedValue {
            color: #00d4ff;
            font-size: clamp(16px, 4.5vw, 20px);
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,212,255,0.4);
        }
        
        #speedLabel {
            font-size: 9px;
            color: rgba(255,255,255,0.4);
        }
        
        #healthBar {
            position: absolute;
            top: max(50px, calc(env(safe-area-inset-top) + 35px));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }
        
        .heart {
            font-size: clamp(22px, 6vw, 28px);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            filter: drop-shadow(0 0 6px rgba(255, 80, 80, 0.4));
        }
        
        .heart.lost {
            opacity: 0.15;
            transform: scale(0.5) rotate(20deg);
            filter: grayscale(1);
        }
        
        .heart.hit {
            animation: heartHit 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        @keyframes heartHit {
            0% { transform: scale(1); }
            25% { transform: scale(1.5); }
            50% { transform: scale(0.7); }
            75% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        #score {
            position: absolute;
            top: max(90px, calc(env(safe-area-inset-top) + 75px));
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: clamp(20px, 5.5vw, 26px);
            font-weight: bold;
            text-shadow: 0 0 12px rgba(255,215,0,0.35);
            letter-spacing: 3px;
        }
        
        #heightDisplay {
            position: absolute;
            top: max(120px, calc(env(safe-area-inset-top) + 105px));
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.45);
            font-size: clamp(11px, 3vw, 13px);
        }
        
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.88);
            pointer-events: all;
            z-index: 10;
            padding: 20px;
        }
        
        #gameOverScreen {
            display: none;
        }
        
        .title {
            font-size: clamp(36px, 10vw, 52px);
            color: #00d4ff;
            text-shadow: 0 0 25px rgba(0,212,255,0.45);
            margin-bottom: 8px;
            letter-spacing: 5px;
            text-align: center;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.45);
            font-size: clamp(13px, 3.5vw, 17px);
            margin-bottom: 55px;
            letter-spacing: 2px;
        }
        
        .btn {
            padding: 16px 55px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: clamp(17px, 5vw, 21px);
            font-weight: bold;
            cursor: pointer;
            pointer-events: all;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
            box-shadow: 0 4px 25px rgba(0,212,255,0.25);
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn:active {
            transform: scale(0.93);
        }
        
        .hint {
            margin-top: 45px;
            color: rgba(255,255,255,0.4);
            font-size: clamp(11px, 3vw, 13px);
            text-align: center;
            line-height: 2.3;
            max-width: 300px;
        }
        
        .finalScore {
            font-size: clamp(44px, 13vw, 60px);
            color: #ffd700;
            text-shadow: 0 0 25px rgba(255,215,0,0.4);
            margin-bottom: 8px;
        }
        
        .bestScore {
            color: rgba(255,255,255,0.45);
            font-size: clamp(13px, 3.5vw, 16px);
            margin-bottom: 40px;
        }
        
        .tutorial-hint {
            position: absolute;
            bottom: max(45px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.2);
            font-size: 12px;
            text-align: center;
            animation: pulse 3s infinite;
            white-space: nowrap;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.5; }
        }
        
        #combo {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff6b6b;
            font-size: clamp(28px, 8vw, 40px);
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-shadow: 0 0 18px rgba(255,107,107,0.5);
            pointer-events: none;
            z-index: 5;
        }
        
        #combo.show {
            opacity: 1;
            transform: translate(-50%, -60%) scale(1.1);
        }
    </style>
<base target="_blank">
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui">
            <div id="windIndicator">
                <span id="windArrow">➡</span>
                <div>
                    <div id="windText">微风</div>
                    <div id="windLabel">风向</div>
                </div>
            </div>
            
            <div id="speedDisplay">
                <div id="speedValue">1.0</div>
                <div id="speedLabel">m/s</div>
            </div>
            
            <div id="healthBar">
                <span class="heart" id="heart1">❤️</span>
                <span class="heart" id="heart2">❤️</span>
                <span class="heart" id="heart3">❤️</span>
            </div>
            
            <div id="score">0</div>
            <div id="heightDisplay">高度: 0m</div>
            
            <div id="combo"></div>
            
            <div class="tutorial-hint" id="tutorialHint" style="display:none">
                按住上升 · 松手下降 · 左右滑动控制位置
            </div>
        </div>
        
        <div id="startScreen">
            <div class="title">🎈 时间气球</div>
            <div class="subtitle">Time Balloon</div>
            <button class="btn" id="startBtn">开始游戏</button>
            <div class="hint">
                🎈 按住屏幕 = 气球上升<br>
                ✋ 松开屏幕 = 气球缓慢下降<br>
                👆 左右滑动 = 直接控制气球位置<br>
                ⚡ 越飞越高，速度会越来越快<br>
                ❤️ 碰到障碍损失生命，共3条命
            </div>
        </div>
        
        <div id="gameOverScreen">
            <div class="finalScore" id="finalScore">0</div>
            <div class="bestScore">最佳: <span id="bestScore">0</span></div>
            <button class="btn" id="restartBtn">再来一次</button>
            <div class="hint" style="margin-top:30px">
                💀 气球坠落了！<br>
                注意躲避障碍
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ========== 响应式画布 ==========
        let GAME_WIDTH = 400;
        let GAME_HEIGHT = 700;
        let scale = 1;
        let offsetX = 0;
        let offsetY = 0;
        
        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            const cw = container.clientWidth;
            const ch = container.clientHeight;
            const ratio = GAME_WIDTH / GAME_HEIGHT;
            const cr = cw / ch;
            
            if (cr > ratio) {
                scale = ch / GAME_HEIGHT;
                offsetX = (cw - GAME_WIDTH * scale) / 2;
                offsetY = 0;
            } else {
                scale = cw / GAME_WIDTH;
                offsetX = 0;
                offsetY = (ch - GAME_HEIGHT * scale) / 2;
            }
            
            canvas.width = cw;
            canvas.height = ch;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        function screenToGame(sx, sy) {
            return { x: (sx - offsetX) / scale, y: (sy - offsetY) / scale };
        }
        
        // 修复：增加X轴边界限制
        function screenToGameX(sx) {
            let gx = (sx - offsetX) / scale;
            gx = Math.max(balloon.radius + 10, Math.min(GAME_WIDTH - balloon.radius - 10, gx));
            return gx;
        }
        
        // ========== 游戏状态 ==========
        let gameState = 'menu';
        let isPressing = false;
        let score = 0;
        let bestScore = localStorage.getItem('timeBalloonBest6') || 0;
        let combo = 0;
        let comboTimer = 0;
        
        // ========== 气球属性 ==========
        const balloon = {
            x: 200,
            y: 450,

            targetX: 200,
            vx: 0,
            followSmooth: 0.15,
            followDamping: 0.88,

            riseBaseSpeed: 1.0,
            riseSpeed: 1.0,
            fallSpeed: 0.4,

            radius: 22,

            wobblePhase: 0,
            wobbleSpeed: 0.03,
            wobbleAmount: 2,

            glow: 0,
            scale: 1,
            targetScale: 1,

            invincible: 0
        };
        
        // ========== 高度与速度系统 ==========
        let height = 0;
        let maxHeight = 0;
        let speedMultiplier = 1;
        
        function updateSpeed() {
            const segments = Math.floor(height / 100);
            speedMultiplier = 1 + segments * 0.15;
            balloon.riseSpeed = balloon.riseBaseSpeed * speedMultiplier;
        }
        
        // ========== 风向系统 ==========
        const wind = {
            current: 0,
            target: 0,
            changeTimer: 0,
            changeInterval: 240,
            maxStrength: 1.5,
            smooth: 0.02
        };
        
        function updateWind() {
            wind.changeTimer++;
            if (wind.changeTimer >= wind.changeInterval) {
                wind.changeTimer = 0;
                wind.target = (Math.random() - 0.5) * 2 * wind.maxStrength;
            }
            wind.current += (wind.target - wind.current) * wind.smooth;
        }
        
        function getWindDescription(strength) {
            const abs = Math.abs(strength);
            if (abs < 0.2) return '无风';
            if (abs < 0.6) return '微风';
            if (abs < 1.0) return '和风';
            if (abs < 1.5) return '强风';
            return '狂风';
        }
        
        // ========== 摄像机 ==========
        let cameraY = 0;
        let cameraTargetY = 0;
        let cameraSmooth = 0.06;
        const BALLOON_SCREEN_Y = 420;
        
        // ========== 生命系统 ==========
        let lives = 3;
        let maxLives = 3;
        let invincibleTime = 0;
        const INVINCIBLE_DURATION = 150;
        
        // ========== 游戏对象 ==========
        let obstacles = [];
        let particles = [];
        let coins = [];
        let stars = [];
        let clouds = [];
        let spawnTimer = 0;
        let difficulty = 1;
        
        // 触摸位置（游戏坐标）
        let touchX = 200;
        let isTouching = false;
        
        // ========== 初始化 ==========
        function initStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * GAME_WIDTH,
                    y: Math.random() * 4000 - 2000,
                    size: Math.random() * 2 + 0.5,
                    brightness: Math.random(),
                    speed: Math.random() * 0.2 + 0.05,
                    twinkleSpeed: Math.random() * 0.015 + 0.005
                });
            }
        }
        
        function initClouds() {
            clouds = [];
            for (let i = 0; i < 8; i++) {
                clouds.push({
                    x: Math.random() * GAME_WIDTH,
                    y: Math.random() * 3000 - 1500,
                    width: 70 + Math.random() * 80,
                    speed: 0.15 + Math.random() * 0.25,
                    opacity: 0.04 + Math.random() * 0.08
                });
            }
        }
        
        // ========== 生成系统 ==========
        function spawnObstacle() {
            const types = ['spike', 'saw', 'laser', 'missile', 'bird'];
            const type = types[Math.floor(Math.random() * Math.min(types.length, Math.floor(difficulty / 2) + 2))];
            
            let obs = {
                type: type,
                y: cameraY - 80 - Math.random() * 60,
                active: true,
                passed: false
            };
            
            switch(type) {
                case 'spike':
                    obs.x = 40 + Math.random() * 320;
                    obs.width = 32;
                    obs.height = 32;
                    break;
                case 'saw':
                    obs.x = 70 + Math.random() * 260;
                    obs.radius = 20;
                    obs.angle = 0;
                    obs.orbitX = obs.x;
                    obs.orbitRadius = 40 + Math.random() * 50;
                    obs.orbitSpeed = 0.012 + Math.random() * 0.018;
                    break;
                case 'laser':
                    obs.x = 0;
                    obs.width = GAME_WIDTH;
                    obs.height = 3;
                    obs.timer = 0;
                    obs.interval = 120 + Math.random() * 80;
                    break;
                case 'missile':
                    obs.x = 25 + Math.random() * 350;
                    obs.y = cameraY - 60;
                    obs.radius = 6;
                    obs.vx = 0;
                    obs.vy = 1.0 + Math.random() * 0.8;
                    obs.trail = [];
                    break;
                case 'bird':
                    obs.x = Math.random() < 0.5 ? -30 : GAME_WIDTH + 30;
                    obs.y = cameraY - 80 - Math.random() * 250;
                    obs.radius = 10;
                    obs.vx = obs.x < 0 ? 1.0 + Math.random() * 0.8 : -1.0 - Math.random() * 0.8;
                    obs.vy = 0;
                    obs.wingPhase = Math.random() * Math.PI * 2;
                    break;
            }
            
            obstacles.push(obs);
        }
        
        function spawnCoins() {
            const pattern = Math.floor(Math.random() * 4);
            const baseX = 70 + Math.random() * 260;
            
            for (let i = 0; i < 5; i++) {
                let x = baseX;
                if (pattern === 1) x = 50 + i * 75;
                if (pattern === 2) x = 200 + Math.sin(i * 0.8) * 90;
                if (pattern === 3) x = 80 + (i % 2) * 240;
                
                coins.push({
                    x: Math.max(20, Math.min(GAME_WIDTH - 20, x)),
                    y: cameraY - 80 - i * 50,
                    radius: 8,
                    collected: false,
                    bob: Math.random() * Math.PI * 2,
                    glow: 0
                });
            }
        }
        
        // ========== 粒子系统 ==========
        function createParticles(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
                const speed = 1.5 + Math.random() * 3;
                
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    decay: 0.012 + Math.random() * 0.015,
                    color: color,
                    size: 2 + Math.random() * 3,
                    gravity: 0.06
                });
            }
        }
        
        function createTrail(x, y, color) {
            particles.push({
                x: x + (Math.random() - 0.5) * 6,
                y: y + (Math.random() - 0.5) * 6,
                vx: (Math.random() - 0.5) * 0.3,
                vy: 0.5 + Math.random() * 0.5,
                life: 0.5,
                decay: 0.025,
                color: color,
                size: 1.5 + Math.random() * 1.5,
                gravity: 0.01
            });
        }
        
        // ========== 碰撞检测 ==========
        function checkCollision(balloon, obj) {
            if (balloon.invincible > 0) return false;
            
            const dx = balloon.x - obj.x;
            const dy = (balloon.y - cameraY) - (obj.y - cameraY);
            const dist = Math.sqrt(dx * dx + dy * dy);
            return dist < balloon.radius + (obj.radius || obj.width / 2 || 12);
        }
        
        // ========== 游戏控制 ==========
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('tutorialHint').style.display = 'block';
            setTimeout(() => {
                document.getElementById('tutorialHint').style.display = 'none';
            }, 7000);
            gameState = 'playing';
            resetGame();
        }
        
        function resetGame() {
            balloon.x = 200;
            balloon.y = 450;
            balloon.targetX = 200;
            balloon.vx = 0;
            balloon.glow = 0;
            balloon.scale = 1;
            balloon.targetScale = 1;
            balloon.invincible = 0;
            balloon.wobblePhase = 0;
            
            cameraY = 0;
            cameraTargetY = 0;
            height = 0;
            maxHeight = 0;
            speedMultiplier = 1;
            
            score = 0;
            combo = 0;
            comboTimer = 0;
            lives = 3;
            invincibleTime = 0;
            difficulty = 1;
            
            wind.current = 0;
            wind.target = 0;
            wind.changeTimer = 0;
            
            touchX = 200;
            isTouching = false;
            
            obstacles = [];
            particles = [];
            coins = [];
            
            spawnTimer = 0;
            
            initStars();
            initClouds();
            
            for (let i = 0; i < 3; i++) {
                spawnObstacle();
                obstacles[obstacles.length - 1].y = -120 - i * 200;
            }
            spawnCoins();
            coins.forEach(c => c.y = -100);
            
            updateHearts();
        }
        
        function restartGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            gameState = 'playing';
            resetGame();
        }
        
        function takeDamage() {
            if (lives <= 0) return;
            
            lives--;
            invincibleTime = INVINCIBLE_DURATION;
            balloon.invincible = INVINCIBLE_DURATION;
            
            balloon.targetScale = 0.75;
            setTimeout(() => { balloon.targetScale = 1; }, 250);
            
            createParticles(balloon.x, balloon.y - cameraY + 350, '#ff4757', 15);
            
            updateHearts();
            
            if (lives <= 0) {
                gameOver();
            }
        }
        
        function updateHearts() {
            for (let i = 1; i <= 3; i++) {
                const heart = document.getElementById('heart' + i);
                if (i > lives) {
                    if (!heart.classList.contains('lost')) {
                        heart.classList.add('hit');
                        setTimeout(() => {
                            heart.classList.remove('hit');
                            heart.classList.add('lost');
                        }, 500);
                    }
                } else {
                    heart.classList.remove('lost', 'hit');
                }
            }
        }
        
        function gameOver() {
            gameState = 'gameover';
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('timeBalloonBest6', bestScore);
            }
            document.getElementById('finalScore').textContent = Math.floor(score);
            document.getElementById('bestScore').textContent = Math.floor(bestScore);
            document.getElementById('gameOverScreen').style.display = 'flex';
            createParticles(balloon.x, balloon.y - cameraY + 350, '#ff4757', 25);
        }
        
        // ========== 主更新循环 ==========
        function update() {
            if (gameState !== 'playing') return;
            
            difficulty = 1 + height / 600;
            
            updateWind();
            updateSpeed();
            
            balloon.wobblePhase += balloon.wobbleSpeed;
            
            // 垂直运动
            if (isPressing) {
                balloon.y -= balloon.riseSpeed;
                balloon.glow = Math.min(balloon.glow + 0.06, 1);
                balloon.targetScale = Math.min(balloon.targetScale + 0.004, 1.1);
                
                if (Math.random() < 0.25) {
                    createTrail(balloon.x, balloon.y + balloon.radius, 'rgba(0, 212, 255, 0.35)');
                }
            } else {
                balloon.y += balloon.fallSpeed;
                balloon.glow = Math.max(balloon.glow - 0.08, 0);
                balloon.targetScale = Math.max(balloon.targetScale - 0.006, 0.95);
            }
            
            // 水平运动
            if (isTouching) {
                balloon.targetX = touchX;
            }
            balloon.vx = balloon.vx * balloon.followDamping + (balloon.targetX - balloon.x) * balloon.followSmooth;
            balloon.x += balloon.vx;
            
            // 边界限制 X
            balloon.x = Math.max(balloon.radius + 10, Math.min(GAME_WIDTH - balloon.radius - 10, balloon.x));
            // 边界限制 Y 防止飞出屏幕底部/顶部
            const minY = cameraY - 200;
            const maxY = cameraY + GAME_HEIGHT - 50;
            balloon.y = Math.max(minY, Math.min(maxY, balloon.y));
            
            // 缩放动画
            balloon.scale += (balloon.targetScale - balloon.scale) * 0.1;
            
            // 高度计算
            height = Math.max(0, -balloon.y + 450);
            if (height > maxHeight) maxHeight = height;
            
            // 摄像机跟随
            cameraTargetY = balloon.y - BALLOON_SCREEN_Y;
            cameraY += (cameraTargetY - cameraY) * cameraSmooth;
            
            score += 0.04 * speedMultiplier;
            
            if (invincibleTime > 0) {
                invincibleTime--;
                balloon.invincible--;
            }
            
            if (comboTimer > 0) {
                comboTimer--;
                if (comboTimer <= 0) {
                    combo = 0;
                    document.getElementById('combo').classList.remove('show');
                }
            }
            
            spawnTimer++;
            const spawnRate = Math.max(45, 90 - difficulty * 4);
            if (spawnTimer > spawnRate) {
                spawnTimer = 0;
                spawnObstacle();
                if (Math.random() < 0.2) spawnCoins();
            }
            
            // 更新障碍
            obstacles.forEach((obs, i) => {
                if (!obs.active) return;
                
                switch(obs.type) {
                    case 'saw':
                        obs.angle += obs.orbitSpeed;
                        obs.x = obs.orbitX + Math.cos(obs.angle) * obs.orbitRadius;
                        break;
                    case 'laser':
                        obs.timer++;
                        obs.active = obs.timer % obs.interval < 20;
                        break;
                    case 'missile':
                        obs.trail.push({x: obs.x, y: obs.y});
                        if (obs.trail.length > 6) obs.trail.shift();
                        
                        const mdx = balloon.x - obs.x;
                        const mdy = (balloon.y) - obs.y;
                        const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
                        if (mdist > 0) {
                            obs.vx += (mdx / mdist) * 0.06;
                            obs.vy += (mdy / mdist) * 0.06;
                        }
                        obs.vx = Math.max(-2, Math.min(2, obs.vx));
                        obs.vy = Math.max(-1.5, Math.min(2, obs.vy));
                        obs.x += obs.vx;
                        obs.y += obs.vy;
                        break;
                    case 'bird':
                        obs.x += obs.vx;
                        obs.wingPhase += 0.12;
                        obs.y += Math.sin(obs.wingPhase) * 0.4;
                        break;
                }
                
                if (checkCollision(balloon, obs)) {
                    if (obs.type !== 'laser' || obs.active) {
                        takeDamage();
                        obs.active = false;
                        createParticles(obs.x, obs.y - cameraY + 350, '#ff6348', 6);
                    }
                }
                
                if (obs.y > cameraY + 900 || obs.x < -60 || obs.x > GAME_WIDTH + 60) {
                    if (!obs.passed && obs.y > balloon.y && obs.active) {
                        score += 3;
                    }
                    obstacles.splice(i, 1);
                }
            });
            
            // 更新金币
            coins.forEach((coin, i) => {
                if (coin.collected) return;
                
                coin.bob += 0.035;
                coin.glow = Math.sin(coin.bob) * 0.25 + 0.75;
                
                const dx = balloon.x - coin.x;
                const dy = (balloon.y - cameraY) - (coin.y - cameraY);
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < balloon.radius + coin.radius + 4) {
                    coin.collected = true;
                    score += 10;
                    combo++;
                    comboTimer = 150;
                    
                    const comboEl = document.getElementById('combo');
                    comboEl.textContent = combo + ' 连击!';
                    comboEl.classList.add('show');
                    setTimeout(() => comboEl.classList.remove('show'), 900);
                    
                    createParticles(coin.x, coin.y - cameraY + 350, '#ffd700', 5);
                }
                
                if (coin.y > cameraY + 900) {
                    coins.splice(i, 1);
                }
            });
            
            // 更新粒子
            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.gravity;
                p.life -= p.decay;
                p.vx *= 0.985;
                
                if (p.life <= 0) particles.splice(i, 1);
            });
            
            // 更新背景
            stars.forEach(star => {
                const moveSpeed = isPressing ? star.speed * speedMultiplier * 1.5 : star.speed * 0.3;
                star.y += moveSpeed;
                star.brightness += Math.sin(Date.now() * star.twinkleSpeed) * 0.008;
                
                if (star.y > cameraY + 900) {
                    star.y = cameraY - 300;
                    star.x = Math.random() * GAME_WIDTH;
                }
            });
            
            clouds.forEach(cloud => {
                cloud.x += wind.current * 0.2;
                const moveSpeed = isPressing ? cloud.speed * speedMultiplier : cloud.speed * 0.2;
                cloud.y += moveSpeed;
                
                if (cloud.x > GAME_WIDTH + 120) cloud.x = -120;
                if (cloud.x < -120) cloud.x = GAME_WIDTH + 120;
                if (cloud.y > cameraY + 900) {
                    cloud.y = cameraY - 400;
                    cloud.x = Math.random() * GAME_WIDTH;
                }
            });
            
            // 更新UI
            document.getElementById('score').textContent = Math.floor(score);
            document.getElementById('heightDisplay').textContent = '高度: ' + Math.floor(height) + 'm';
            document.getElementById('speedValue').textContent = balloon.riseSpeed.toFixed(1);
            
            const windArrow = document.getElementById('windArrow');
            const windDeg = wind.current > 0 ? 0 : 180;
            windArrow.style.transform = 'rotate(' + windDeg + 'deg)';
            
            const windStrength = Math.abs(wind.current);
            if (windStrength < 0.2) {
                windArrow.textContent = '·';
                windArrow.style.opacity = '0.3';
            } else if (wind.current > 0) {
                windArrow.textContent = '➡';
                windArrow.style.opacity = Math.min(1, windStrength / 1.2);
                windArrow.style.color = '#74b9ff';
            } else {
                windArrow.textContent = '⬅';
                windArrow.style.opacity = Math.min(1, windStrength / 1.2);
                windArrow.style.color = '#74b9ff';
            }
            
            document.getElementById('windText').textContent = getWindDescription(wind.current);
        }
        
        // ========== 绘制 ==========
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGradient.addColorStop(0, '#08081a');
            bgGradient.addColorStop(0.5, '#0f0f28');
            bgGradient.addColorStop(1, '#0a1525');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);
            
            // 绘制云朵
            clouds.forEach(cloud => {
                const cy = cloud.y - cameraY + 350;
                ctx.fillStyle = `rgba(255, 255, 255, ${cloud.opacity})`;
                ctx.beginPath();
                ctx.ellipse(cloud.x, cy, cloud.width / 2, cloud.width / 6, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cloud.x - cloud.width * 0.25, cy - 4, cloud.width / 3.5, cloud.width / 7, 0, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // 绘制星星
            stars.forEach(star => {
                const alpha = Math.max(0.1, Math.min(1, star.brightness));
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y - cameraY + 350, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // 绘制金币
            coins.forEach(coin => {
                if (coin.collected) return;
                const bobY = Math.sin(coin.bob) * 3;
                const cy = coin.y - cameraY + 350 + bobY;
                
                ctx.fillStyle = `rgba(255, 215, 0, ${coin.glow * 0.12})`;
                ctx.beginPath();
                ctx.arc(coin.x, cy, coin.radius + 5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(coin.x, cy, coin.radius, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#ffed4e';
                ctx.beginPath();
                ctx.arc(coin.x - 1.5, cy - 1.5, coin.radius * 0.35, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#b8860b';
                ctx.font = 'bold 9px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('★', coin.x, cy + 0.5);
            });
            
            // 绘制障碍
            obstacles.forEach(obs => {
                if (!obs.active && obs.type !== 'laser') return;
                
                const sy = obs.y - cameraY + 350;
                
                switch(obs.type) {
                    case 'spike':
                        ctx.fillStyle = '#e74c3c';
                        ctx.beginPath();
                        ctx.moveTo(obs.x, sy - obs.height / 2);
                        ctx.lineTo(obs.x - obs.width / 2, sy + obs.height / 2);
                        ctx.lineTo(obs.x + obs.width / 2, sy + obs.height / 2);
                        ctx.closePath();
                        ctx.fill();
                        
                        ctx.strokeStyle = '#ff6b6b';
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                        break;
                        
                    case 'saw':
                        ctx.save();
                        ctx.translate(obs.x, sy);
                        ctx.rotate(obs.angle * 3);
                        
                        ctx.fillStyle = '#e17055';
                        for (let i = 0; i < 8; i++) {
                            ctx.rotate(Math.PI / 4);
                            ctx.fillRect(-2.5, -obs.radius, 5, obs.radius * 0.55);
                        }
                        
                        ctx.beginPath();
                        ctx.arc(0, 0, obs.radius * 0.3, 0, Math.PI * 2);
                        ctx.fillStyle = '#2d3436';
                        ctx.fill();
                        
                        ctx.restore();
                        break;
                        
                    case 'laser':
                        const isActive = obs.timer % obs.interval < 20;
                        if (isActive) {
                            ctx.shadowColor = '#ff3333';
                            ctx.shadowBlur = 12;
                            ctx.fillStyle = 'rgba(255, 60, 60, 0.85)';
                        } else {
                            ctx.shadowBlur = 0;
                            ctx.fillStyle = 'rgba(255, 60, 60, 0.12)';
                        }
                        ctx.fillRect(obs.x, sy, obs.width, obs.height);
                        ctx.shadowBlur = 0;
                        break;
                        
                    case 'missile':
                        obs.trail.forEach((t, i) => {
                            const ty = t.y - cameraY + 350;
                            ctx.fillStyle = `rgba(255, 100, 50, ${i / obs.trail.length * 0.35})`;
                            ctx.beginPath();
                            ctx.arc(t.x, ty, obs.radius * (i / obs.trail.length), 0, Math.PI * 2);
                            ctx.fill();
                        });
                        
                        ctx.fillStyle = '#e74c3c';
                        ctx.beginPath();
                        ctx.arc(obs.x, sy, obs.radius, 0, Math.PI * 2);
                        ctx.fill();
                        
                        ctx.fillStyle = '#f1c40f';
                        ctx.beginPath();
                        ctx.arc(obs.x, sy, obs.radius * 0.3, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                        
                    case 'bird':
                        ctx.save();
                        ctx.translate(obs.x, sy);
                        const facing = obs.vx > 0 ? 1 : -1;
                        ctx.scale(facing, 1);
                        
                        const wingY = Math.sin(obs.wingPhase) * 5;
                        
                        ctx.fillStyle = '#74b9ff';
                        ctx.beginPath();
                        ctx.ellipse(0, 0, 10, 6, 0, 0, Math.PI * 2);
                        ctx.fill();
                        
                        ctx.fillStyle = '#a29bfe';
                        ctx.beginPath();
                        ctx.moveTo(-4, -1.5);
                        ctx.lineTo(4, -1.5 + wingY);
                        ctx.lineTo(0, 4);
                        ctx.closePath();
                        ctx.fill();
                        
                        ctx.beginPath();
                        ctx.moveTo(-4, 1.5);
                        ctx.lineTo(4, 1.5 - wingY);
                        ctx.lineTo(0, -4);
                        ctx.closePath();
                        ctx.fill();
                        
                        ctx.restore();
                        break;
                }
            });
            
            // 绘制粒子
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            
            // ========== 绘制气球（已删除虚假坐标修正） ==========
            const balloonScreenY = balloon.y - cameraY + 350;
            const wobble = Math.sin(balloon.wobblePhase) * balloon.wobbleAmount;
            let drawY = balloonScreenY;
            
            if (balloon.invincible > 0 && Math.floor(balloon.invincible / 8) % 2 === 0) {
                ctx.globalAlpha = 0.35;
            }
            
            if (balloon.glow > 0) {
                ctx.shadowColor = '#00d4ff';
                ctx.shadowBlur = 12 + balloon.glow * 18;
            }
            
            const bs = balloon.scale;
            const gradient = ctx.createRadialGradient(
                balloon.x - 4, drawY - 4, 0,
                balloon.x, drawY, balloon.radius * bs
            );
            gradient.addColorStop(0, '#81ecec');
            gradient.addColorStop(0.6, '#00d4ff');
            gradient.addColorStop(1, '#0984e3');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.ellipse(
                balloon.x + wobble * 0.2, 
                drawY, 
                balloon.radius * bs, 
                balloon.radius * 1.1 * bs, 
                wobble * 0.01, 
                0, 
                Math.PI * 2
            );
            ctx.fill();
            
            ctx.shadowBlur = 0;
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.beginPath();
            ctx.ellipse(
                balloon.x - 5 + wobble * 0.1, 
                drawY - 7, 
                5 * bs, 
                7 * bs, 
                -0.2, 
                0, 
                Math.PI * 2
            );
            ctx.fill();
            
            // 绳子
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.45)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(balloon.x + wobble * 0.2, drawY + balloon.radius * 1.05 * bs);
            
            const ropeSwing = Math.sin(Date.now() * 0.002) * 4;
            ctx.bezierCurveTo(
                balloon.x + ropeSwing, drawY + balloon.radius * 1.2 * bs,
                balloon.x + ropeSwing * 0.3, drawY + balloon.radius * 1.4 * bs,
                balloon.x, drawY + balloon.radius * 1.5 * bs + 10
            );
            ctx.stroke();
            
            // 小篮子
            ctx.fillStyle = 'rgba(180, 140, 90, 0.55)';
            ctx.fillRect(balloon.x - 5, drawY + balloon.radius * 1.5 * bs + 10, 10, 7);
            
            ctx.globalAlpha = 1;
            
            // 低生命警告
            if (lives === 1) {
                ctx.fillStyle = `rgba(255, 50, 50, ${0.12 + Math.sin(Date.now() * 0.006) * 0.08})`;
                ctx.fillRect(-offsetX / scale, -offsetY / scale, canvas.width / scale, canvas.height / scale);
            }
            
            ctx.restore();
        }
        
        // ========== 输入处理（修复触摸坐标） ==========
        function getEventPos(e) {
            const rect = canvas.getBoundingClientRect();
            if (e.touches && e.touches.length > 0) {
                return {
                    x: e.touches[0].clientX - rect.left,
                    y: e.touches[0].clientY - rect.top
                };
            } else if (e.changedTouches && e.changedTouches.length > 0) {
                return {
                    x: e.changedTouches[0].clientX - rect.left,
                    y: e.changedTouches[0].clientY - rect.top
                };
            }
            return { 
                x: e.clientX - rect.left, 
                y: e.clientY - rect.top 
            };
        }

        function handleStart(e) {
            if (gameState !== 'playing') return;
            e.preventDefault();
            isPressing = true;
            isTouching = true;

            const pos = getEventPos(e);
            touchX = screenToGameX(pos.x);
            balloon.targetX = touchX;
        }

        function handleMove(e) {
            if (!isTouching || gameState !== 'playing') return;
            e.preventDefault();

            const pos = getEventPos(e);
            touchX = screenToGameX(pos.x);
            balloon.targetX = touchX;
        }

        function handleEnd(e) {
            e.preventDefault();
            isPressing = false;
            isTouching = false;
        }
        
        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('mouseleave', handleEnd);
        
        canvas.addEventListener('touchstart', handleStart, {passive: false});
        canvas.addEventListener('touchmove', handleMove, {passive: false});
        canvas.addEventListener('touchend', handleEnd, {passive: false});
        canvas.addEventListener('touchcancel', handleEnd, {passive: false});
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && gameState === 'playing') {
                isPressing = true;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                isPressing = false;
            }
        });
        
        // 按钮
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('startBtn').addEventListener('touchend', (e) => {
            e.preventDefault();
            startGame();
        });
        
        document.getElementById('restartBtn').addEventListener('click', restartGame);
