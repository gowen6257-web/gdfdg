<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>时间气球 - Time Balloon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a1a;
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #0f0f23 0%, #1a1a3e 50%, #16213e 100%);
            overflow: hidden;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #windIndicator {
            position: absolute;
            top: max(12px, env(safe-area-inset-top));
            left: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.8);
            font-size: clamp(12px, 3.5vw, 15px);
            font-weight: bold;
        }
        
        #windArrow {
            font-size: 20px;
            transition: transform 0.5s ease;
            display: inline-block;
        }
        
        #windLabel {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
        }
        
        #speedDisplay {
            position: absolute;
            top: max(12px, env(safe-area-inset-top));
            right: 15px;
            color: #00d4ff;
            font-size: clamp(14px, 4vw, 18px);
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,212,255,0.4);
        }
        
        #speedLabel {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            text-align: right;
        }
        
        #healthBar {
            position: absolute;
            top: max(45px, calc(env(safe-area-inset-top) + 30px));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }
        
        .heart {
            font-size: clamp(20px, 5.5vw, 26px);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            filter: drop-shadow(0 0 8px rgba(255, 100, 100, 0.5));
        }
        
        .heart.lost {
            opacity: 0.2;
            transform: scale(0.6);
            filter: grayscale(1);
        }
        
        .heart.hit {
            animation: heartHit 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        @keyframes heartHit {
            0% { transform: scale(1); }
            30% { transform: scale(1.4); }
            60% { transform: scale(0.8); }
            100% { transform: scale(1); }
        }
        
        #score {
            position: absolute;
            top: max(80px, calc(env(safe-area-inset-top) + 65px));
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: clamp(18px, 5vw, 24px);
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,215,0,0.4);
            letter-spacing: 2px;
        }
        
        #heightDisplay {
            position: absolute;
            top: max(110px, calc(env(safe-area-inset-top) + 95px));
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: clamp(11px, 3vw, 13px);
        }
        
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.88);
            pointer-events: all;
            z-index: 10;
            padding: 20px;
        }
        
        #gameOverScreen {
            display: none;
        }
        
        .title {
            font-size: clamp(32px, 9vw, 48px);
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0,212,255,0.5);
            margin-bottom: 8px;
            letter-spacing: 4px;
            text-align: center;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.5);
            font-size: clamp(12px, 3.5vw, 16px);
            margin-bottom: 50px;
        }
        
        .btn {
            padding: 16px 55px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: clamp(16px, 5vw, 20px);
            font-weight: bold;
            cursor: pointer;
            pointer-events: all;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(0,212,255,0.3);
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .hint {
            margin-top: 40px;
            color: rgba(255,255,255,0.45);
            font-size: clamp(11px, 3vw, 13px);
            text-align: center;
            line-height: 2.2;
            max-width: 320px;
        }
        
        .finalScore {
            font-size: clamp(40px, 12vw, 56px);
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            margin-bottom: 8px;
        }
        
        .bestScore {
            color: rgba(255,255,255,0.5);
            font-size: clamp(12px, 3.5vw, 16px);
            margin-bottom: 40px;
        }
        
        .tutorial-hint {
            position: absolute;
            bottom: max(40px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.25);
            font-size: 12px;
            text-align: center;
            animation: pulse 2.5s infinite;
            white-space: nowrap;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.25; }
            50% { opacity: 0.6; }
        }
        
        .invincible-flash {
            animation: invincibleFlash 0.15s alternate 6;
        }
        
        @keyframes invincibleFlash {
            from { opacity: 1; }
            to { opacity: 0.3; }
        }
        
        #combo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff6b6b;
            font-size: clamp(24px, 7vw, 36px);
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-shadow: 0 0 15px rgba(255,107,107,0.6);
            pointer-events: none;
            z-index: 5;
        }
        
        #combo.show {
            opacity: 1;
            transform: translate(-50%, -60%);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui">
            <div id="windIndicator">
                <span id="windArrow">➡</span>
                <div>
                    <div id="windValue">0.0</div>
                    <div id="windLabel">风向</div>
                </div>
            </div>
            
            <div id="speedDisplay">
                <div id="speedValue">2.0</div>
                <div id="speedLabel">m/s</div>
            </div>
            
            <div id="healthBar">
                <span class="heart" id="heart1">❤️</span>
                <span class="heart" id="heart2">❤️</span>
                <span class="heart" id="heart3">❤️</span>
            </div>
            
            <div id="score">0</div>
            <div id="heightDisplay">高度: 0m</div>
            
            <div id="combo"></div>
            
            <div class="tutorial-hint" id="tutorialHint" style="display:none">
                按住上升 · 松手下降 · 风向会推动气球
            </div>
        </div>
        
        <div id="startScreen">
            <div class="title">🎈 时间气球</div>
            <div class="subtitle">Time Balloon</div>
            <button class="btn" id="startBtn">开始游戏</button>
            <div class="hint">
                🎈 按住屏幕 = 气球上升<br>
                ✋ 松开屏幕 = 气球缓慢下降<br>
                🌬️ 风向会推动气球左右漂移<br>
                ⚡ 越飞越高，速度会越来越快<br>
                ❤️ 碰到障碍损失生命，共3条命
            </div>
        </div>
        
        <div id="gameOverScreen">
            <div class="finalScore" id="finalScore">0</div>
            <div class="bestScore">最佳: <span id="bestScore">0</span></div>
            <button class="btn" id="restartBtn">再来一次</button>
            <div class="hint" style="margin-top:30px">
                💀 气球坠落了！<br>
                注意风向变化，灵活躲避障碍
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 响应式画布
        let GAME_WIDTH = 400;
        let GAME_HEIGHT = 700;
        let scale = 1;
        let offsetX = 0;
        let offsetY = 0;
        
        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            const cw = container.clientWidth;
            const ch = container.clientHeight;
            const ratio = GAME_WIDTH / GAME_HEIGHT;
            const cr = cw / ch;
            
            if (cr > ratio) {
                scale = ch / GAME_HEIGHT;
                offsetX = (cw - GAME_WIDTH * scale) / 2;
                offsetY = 0;
            } else {
                scale = cw / GAME_WIDTH;
                offsetX = 0;
                offsetY = (ch - GAME_HEIGHT * scale) / 2;
            }
            
            canvas.width = cw;
            canvas.height = ch;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        function screenToGame(sx, sy) {
            return { x: (sx - offsetX) / scale, y: (sy - offsetY) / scale };
        }
        
        // ========== 游戏状态 ==========
        let gameState = 'menu';
        let isPressing = false;
        let score = 0;
        let bestScore = localStorage.getItem('timeBalloonBest2') || 0;
        let combo = 0;
        let comboTimer = 0;
        
        // ========== 气球属性（贝塞尔曲线动画） ==========
        const balloon = {
            x: 200,
            y: 500,
            targetX: 200,
            targetY: 500,
            vx: 0,
            vy: 0,
            radius: 22,
            
            // 贝塞尔插值参数
            smoothX: 0.12,
            smoothY: 0.08,
            
            // 动画状态
            wobblePhase: 0,
            wobbleSpeed: 0.03,
            wobbleAmount: 3,
            
            // 物理
            riseBaseSpeed: 1.8,
            riseSpeed: 1.8,
            fallSpeed: 1.2,
            horizontalSpeed: 4,
            
            // 视觉
            glow: 0,
            scale: 1,
            targetScale: 1,
            
            // 无敌时间
            invincible: 0
        };
        
        // ========== 高度与速度系统 ==========
        let height = 0;
        let maxHeight = 0;
        let speedMultiplier = 1;
        
        function updateSpeed() {
            const segments = Math.floor(height / 100);
            speedMultiplier = 1 + segments * 0.15;
            balloon.riseSpeed = balloon.riseBaseSpeed * speedMultiplier;
        }
        
        // ========== 风向系统 ==========
        const wind = {
            current: 0,
            target: 0,
            changeTimer: 0,
            changeInterval: 180,
            maxStrength: 2.5,
            smooth: 0.02
        };
        
        function updateWind() {
            wind.changeTimer++;
            if (wind.changeTimer >= wind.changeInterval) {
                wind.changeTimer = 0;
                wind.target = (Math.random() - 0.5) * 2 * wind.maxStrength;
            }
            
            // 贝塞尔缓动
            wind.current += (wind.target - wind.current) * wind.smooth;
        }
        
        function getWindArrow(degree) {
            const arrows = ['⬅', '↖', '⬆', '↗', '➡', '↘', '⬇', '↙'];
            const idx = Math.round((degree + 180) / 45) % 8;
            return arrows[idx] || '➡';
        }
        
        // ========== 摄像机 ==========
        let cameraY = 0;
        let cameraSmooth = 0.06;
        let cameraTargetY = 0;
        
        // ========== 生命系统 ==========
        let lives = 3;
        let maxLives = 3;
        let invincibleTime = 0;
        const INVINCIBLE_DURATION = 120;
        
        // ========== 游戏对象 ==========
        let obstacles = [];
        let particles = [];
        let coins = [];
        let stars = [];
        let clouds = [];
        let spawnTimer = 0;
        let difficulty = 1;
        
        // ========== 初始化 ==========
        function initStars() {
            stars = [];
            for (let i = 0; i < 80; i++) {
                stars.push({
                    x: Math.random() * GAME_WIDTH,
                    y: Math.random() * 3000 - 1500,
                    size: Math.random() * 2 + 0.5,
                    brightness: Math.random(),
                    speed: Math.random() * 0.3 + 0.1,
                    twinkleSpeed: Math.random() * 0.02 + 0.01
                });
            }
        }
        
        function initClouds() {
            clouds = [];
            for (let i = 0; i < 6; i++) {
                clouds.push({
                    x: Math.random() * GAME_WIDTH,
                    y: Math.random() * 2000 - 1000,
                    width: 80 + Math.random() * 60,
                    speed: 0.2 + Math.random() * 0.3,
                    opacity: 0.05 + Math.random() * 0.08
                });
            }
        }
        
        // ========== 生成系统 ==========
        function spawnObstacle() {
            const types = ['spike', 'saw', 'laser', 'missile', 'bird'];
            const type = types[Math.floor(Math.random() * Math.min(types.length, Math.floor(difficulty / 2) + 2))];
            
            let obs = {
                type: type,
                y: cameraY - 100 - Math.random() * 50,
                active: true,
                passed: false
            };
            
            switch(type) {
                case 'spike':
                    obs.x = 50 + Math.random() * 300;
                    obs.width = 35;
                    obs.height = 35;
                    break;
                case 'saw':
                    obs.x = 80 + Math.random() * 240;
                    obs.radius = 22;
                    obs.angle = 0;
                    obs.orbitX = obs.x;
                    obs.orbitRadius = 50 + Math.random() * 40;
                    obs.orbitSpeed = 0.015 + Math.random() * 0.02;
                    break;
                case 'laser':
                    obs.x = 0;
                    obs.width = GAME_WIDTH;
                    obs.height = 3;
                    obs.timer = 0;
                    obs.interval = 100 + Math.random() * 60;
                    break;
                case 'missile':
                    obs.x = 30 + Math.random() * 340;
                    obs.y = cameraY - 80;
                    obs.radius = 7;
                    obs.vx = 0;
                    obs.vy = 1.5 + Math.random();
                    obs.trail = [];
                    break;
                case 'bird':
                    obs.x = Math.random() < 0.5 ? -20 : GAME_WIDTH + 20;
                    obs.y = cameraY - 100 - Math.random() * 200;
                    obs.radius = 12;
                    obs.vx = obs.x < 0 ? 1.5 + Math.random() : -1.5 - Math.random();
                    obs.vy = 0;
                    obs.wingPhase = Math.random() * Math.PI * 2;
                    break;
            }
            
            obstacles.push(obs);
        }
        
        function spawnCoins() {
            const pattern = Math.floor(Math.random() * 4);
            const baseX = 80 + Math.random() * 240;
            
            for (let i = 0; i < 5; i++) {
                let x = baseX;
                if (pattern === 1) x = 60 + i * 70;
                if (pattern === 2) x = 200 + Math.sin(i * 0.8) * 100;
                if (pattern === 3) x = 100 + (i % 2) * 200;
                
                coins.push({
                    x: Math.max(25, Math.min(GAME_WIDTH - 25, x)),
                    y: cameraY - 100 - i * 45,
                    radius: 9,
                    collected: false,
                    bob: Math.random() * Math.PI * 2,
                    glow: 0
                });
            }
        }
        
        // ========== 粒子系统 ==========
        function createParticles(x, y, color, count = 12, type = 'burst') {
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
                const speed = 2 + Math.random() * 4;
                
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    decay: 0.015 + Math.random() * 0.02,
                    color: color,
                    size: 2 + Math.random() * 4,
                    type: type,
                    gravity: 0.08
                });
            }
        }
        
        function createTrail(x, y, color) {
            particles.push({
                x: x + (Math.random() - 0.5) * 8,
                y: y + (Math.random() - 0.5) * 8,
                vx: (Math.random() - 0.5) * 0.5,
                vy: 1 + Math.random(),
                life: 0.6,
                decay: 0.03,
                color: color,
                size: 2 + Math.random() * 2,
                type: 'trail',
                gravity: 0.02
            });
        }
        
        // ========== 碰撞检测 ==========
        function checkCollision(balloon, obj) {
            if (balloon.invincible > 0) return false;
            
            const dx = balloon.x - obj.x;
            const dy = (balloon.y - cameraY) - (obj.y - cameraY);
            const dist = Math.sqrt(dx * dx + dy * dy);
            return dist < balloon.radius + (obj.radius || obj.width / 2 || 15);
        }
        
        // ========== 游戏控制 ==========
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('tutorialHint').style.display = 'block';
            setTimeout(() => {
                document.getElementById('tutorialHint').style.display = 'none';
            }, 6000);
            gameState = 'playing';
            resetGame();
        }
        
        function resetGame() {
            balloon.x = 200;
            balloon.y = 500;
            balloon.targetX = 200;
            balloon.targetY = 500;
            balloon.vx = 0;
            balloon.vy = 0;
            balloon.glow = 0;
            balloon.scale = 1;
            balloon.targetScale = 1;
            balloon.invincible = 0;
            balloon.wobblePhase = 0;
            
            cameraY = 0;
            cameraTargetY = 0;
            height = 0;
            maxHeight = 0;
            speedMultiplier = 1;
            
            score = 0;
            combo = 0;
            comboTimer = 0;
            lives = 3;
            invincibleTime = 0;
            difficulty = 1;
            
            wind.current = 0;
            wind.target = 0;
            wind.changeTimer = 0;
            
            obstacles = [];
            particles = [];
            coins = [];
            
            spawnTimer = 0;
            
            initStars();
            initClouds();
            
            // 预生成
            for (let i = 0; i < 4; i++) {
                spawnObstacle();
                obstacles[obstacles.length - 1].y = -150 - i * 180;
            }
            spawnCoins();
            coins.forEach(c => c.y = -120);
            
            updateHearts();
        }
        
        function restartGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            gameState = 'playing';
            resetGame();
        }
        
        function takeDamage() {
            if (lives <= 0) return;
            
            lives--;
            invincibleTime = INVINCIBLE_DURATION;
            balloon.invincible = INVINCIBLE_DURATION;
            
            // 受伤动画
            balloon.targetScale = 0.8;
            setTimeout(() => { balloon.targetScale = 1; }, 200);
            
            createParticles(balloon.x, balloon.y - cameraY + 350, '#ff4757', 20);
            
            updateHearts();
            
            if (lives <= 0) {
                gameOver();
            }
        }
        
        function updateHearts() {
            for (let i = 1; i <= 3; i++) {
                const heart = document.getElementById('heart' + i);
                if (i > lives) {
                    if (!heart.classList.contains('lost')) {
                        heart.classList.add('hit');
                        setTimeout(() => {
                            heart.classList.remove('hit');
                            heart.classList.add('lost');
                        }, 400);
                    }
                } else {
                    heart.classList.remove('lost', 'hit');
                }
            }
        }
        
        function gameOver() {
            gameState = 'gameover';
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('timeBalloonBest2', bestScore);
            }
            document.getElementById('finalScore').textContent = Math.floor(score);
            document.getElementById('bestScore').textContent = Math.floor(bestScore);
            document.getElementById('gameOverScreen').style.display = 'flex';
            createParticles(balloon.x, balloon.y - cameraY + 350, '#ff4757', 30);
        }
        
        // ========== 主更新循环 ==========
        function update() {
            if (gameState !== 'playing') return;
            
            // 更新难度
            difficulty = 1 + height / 500;
            
            // 更新风向
            updateWind();
            
            // 更新速度
            updateSpeed();
            
            // 气球物理（贝塞尔曲线平滑）
            balloon.wobblePhase += balloon.wobbleSpeed;
            
            if (isPressing) {
                // 上升 - 使用缓动
                balloon.targetY -= balloon.riseSpeed;
                balloon.glow = Math.min(balloon.glow + 0.05, 1);
                balloon.targetScale = Math.min(balloon.targetScale + 0.005, 1.15);
                
                // 产生上升尾迹
                if (Math.random() < 0.3) {
                    createTrail(balloon.x, balloon.y + balloon.radius, 'rgba(0, 212, 255, 0.4)');
                }
            } else {
                // 下降
                balloon.targetY += balloon.fallSpeed;
                balloon.glow = Math.max(balloon.glow - 0.08, 0);
                balloon.targetScale = Math.max(balloon.targetScale - 0.008, 0.95);
            }
            
            // 贝塞尔平滑插值
            balloon.y += (balloon.targetY - balloon.y) * balloon.smoothY;
            
            // 风向影响（平滑）
            balloon.targetX += wind.current * 0.5;
            balloon.targetX = Math.max(balloon.radius + 10, Math.min(GAME_WIDTH - balloon.radius - 10, balloon.targetX));
            balloon.x += (balloon.targetX - balloon.x) * balloon.smoothX;
            
            // 缩放动画平滑
            balloon.scale += (balloon.targetScale - balloon.scale) * 0.1;
            
            // 更新高度
            height = Math.max(0, -balloon.y + 500);
            if (height > maxHeight) maxHeight = height;
            
            // 摄像机跟随（贝塞尔平滑）
            cameraTargetY = balloon.y - 350;
            cameraY += (cameraTargetY - cameraY) * cameraSmooth;
            
            // 分数
            score += 0.05 * speedMultiplier;
            
            // 无敌时间
            if (invincibleTime > 0) {
                invincibleTime--;
                balloon.invincible--;
            }
            
            // 连击
            if (comboTimer > 0) {
                comboTimer--;
                if (comboTimer <= 0) {
                    combo = 0;
                    document.getElementById('combo').classList.remove('show');
                }
            }
            
            // 生成
            spawnTimer++;
            const spawnRate = Math.max(40, 80 - difficulty * 5);
            if (spawnTimer > spawnRate) {
                spawnTimer = 0;
                spawnObstacle();
                if (Math.random() < 0.25) spawnCoins();
            }
            
            // 更新障碍
            obstacles.forEach((obs, i) => {
                if (!obs.active) return;
                
                switch(obs.type) {
                    case 'saw':
                        obs.angle += obs.orbitSpeed;
                        obs.x = obs.orbitX + Math.cos(obs.angle) * obs.orbitRadius;
                        break;
                    case 'laser':
                        obs.timer++;
                        obs.active = obs.timer % obs.interval < 25;
                        break;
                    case 'missile':
                        obs.trail.push({x: obs.x, y: obs.y});
                        if (obs.trail.length > 8) obs.trail.shift();
                        
                        const mdx = balloon.x - obs.x;
                        const mdy = (balloon.y) - obs.y;
                        const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
                        if (mdist > 0) {
                            obs.vx += (mdx / mdist) * 0.08;
                            obs.vy += (mdy / mdist) * 0.08;
                        }
                        obs.vx = Math.max(-2.5, Math.min(2.5, obs.vx));
                        obs.vy = Math.max(-2, Math.min(2.5, obs.vy));
                        obs.x += obs.vx;
                        obs.y += obs.vy;
                        break;
                    case 'bird':
                        obs.x += obs.vx;
                        obs.wingPhase += 0.15;
                        obs.y += Math.sin(obs.wingPhase) * 0.5;
                        break;
                }
                
                // 碰撞
                if (checkCollision(balloon, obs)) {
                    if (obs.type !== 'laser' || obs.active) {
                        takeDamage();
                        obs.active = false;
                        createParticles(obs.x, obs.y - cameraY + 350, '#ff6348', 8);
                    }
                }
                
                // 清理
                if (obs.y > cameraY + 800 || obs.x < -50 || obs.x > GAME_WIDTH + 50) {
                    if (!obs.passed && obs.y > balloon.y && obs.active) {
                        score += 5;
                    }
                    obstacles.splice(i, 1);
                }
            });
            
            // 更新金币
            coins.forEach((coin, i) => {
                if (coin.collected) return;
                
                coin.bob += 0.04;
                coin.glow = Math.sin(coin.bob) * 0.3 + 0.7;
                
                const dx = balloon.x - coin.x;
                const dy = (balloon.y - cameraY) - (coin.y - cameraY);
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < balloon.radius + coin.radius + 5) {
                    coin.collected = true;
                    score += 10;
                    combo++;
                    comboTimer = 120;
                    
                    const comboEl = document.getElementById('combo');
                    comboEl.textContent = combo + ' 连击!';
                    comboEl.classList.add('show');
                    setTimeout(() => comboEl.classList.remove('show'), 800);
                    
                    createParticles(coin.x, coin.y - cameraY + 350, '#ffd700', 6);
                }
                
                if (coin.y > cameraY + 800) {
                    coins.splice(i, 1);
                }
            });
            
            // 更新粒子
            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.gravity;
                p.life -= p.decay;
                p.vx *= 0.98;
                
                if (p.life <= 0) particles.splice(i, 1);
            });
            
            // 更新背景
            stars.forEach(star => {
                if (isPressing) {
                    star.y += star.speed * speedMultiplier * 2;
                } else {
                    star.y += star.speed * 0.5;
                }
                star.brightness += Math.sin(Date.now() * star.twinkleSpeed) * 0.01;
                
                if (star.y > cameraY + 800) {
                    star.y = cameraY - 200;
                    star.x = Math.random() * GAME_WIDTH;
                }
            });
            
            clouds.forEach(cloud => {
                cloud.x += wind.current * 0.3;
                if (isPressing) cloud.y += cloud.speed * speedMultiplier;
                else cloud.y += cloud.speed * 0.3;
                
                if (cloud.x > GAME_WIDTH + 100) cloud.x = -100;
                if (cloud.x < -100) cloud.x = GAME_WIDTH + 100;
                if (cloud.y > cameraY + 800) {
                    cloud.y = cameraY - 300;
                    cloud.x = Math.random() * GAME_WIDTH;
                }
            });
            
            // 更新UI
            document.getElementById('score').textContent = Math.floor(score);
            document.getElementById('heightDisplay').textContent = '高度: ' + Math.floor(height) + 'm';
            document.getElementById('speedValue').textContent = balloon.riseSpeed.toFixed(1);
            document.getElementById('windValue').textContent = Math.abs(wind.current).toFixed(1);
            
            const windArrow = document.getElementById('windArrow');
            const windDeg = wind.current > 0 ? 90 : (wind.current < 0 ? -90 : 0);
            windArrow.style.transform = 'rotate(' + windDeg + 'deg)';
            windArrow.textContent = wind.current > 0.3 ? '➡' : (wind.current < -0.3 ? '⬅' : '·');
        }
        
        // ========== 绘制 ==========
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 背景渐变
            const bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGradient.addColorStop(0, '#0a0a1e');
            bgGradient.addColorStop(0.5, '#121230');
            bgGradient.addColorStop(1, '#0d1b2a');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);
            
            // 绘制云朵
            clouds.forEach(cloud => {
                const cy = cloud.y - cameraY + 350;
                ctx.fillStyle = `rgba(255, 255, 255, ${cloud.opacity})`;
                ctx.beginPath();
                ctx.ellipse(cloud.x, cy, cloud.width / 2, cloud.width / 5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cloud.x - cloud.width * 0.2, cy - 5, cloud.width / 3, cloud.width / 6, 0, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // 绘制星星
            stars.forEach(star => {
                const alpha = Math.max(0.1, Math.min(1, star.brightness));
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y - cameraY + 350, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // 绘制金币
            coins.forEach(coin => {
                if (coin.collected) return;
                const bobY = Math.sin(coin.bob) * 4;
                const cy = coin.y - cameraY + 350 + bobY;
                
                // 光晕
                ctx.fillStyle = `rgba(255, 215, 0, ${coin.glow * 0.15})`;
                ctx.beginPath();
                ctx.arc(coin.x, cy, coin.radius + 6, 0, Math.PI * 2);
                ctx.fill();
                
                // 金币
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(coin.x, cy, coin.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // 高光
                ctx.fillStyle = '#ffed4e';
                ctx.beginPath();
                ctx.arc(coin.x - 2, cy - 2, coin.radius * 0.4, 0, Math.PI * 2);
                ctx.fill();
                
                // 符号
                ctx.fillStyle = '#b8860b';
                ctx.font = 'bold 10px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('★', coin.x, cy + 1);
            });
            
            // 绘制障碍
            obstacles.forEach(obs => {
                if (!obs.active && obs.type !== 'laser') return;
                
                const sy = obs.y - cameraY + 350;
                
                switch(obs.type) {
                    case 'spike':
                        ctx.fillStyle = '#ff4757';
                        ctx.beginPath();
                        ctx.moveTo(obs.x, sy - obs.height / 2);
                        ctx.lineTo(obs.x - obs.width / 2, sy + obs.height / 2);
                        ctx.lineTo(obs.x + obs.width / 2, sy + obs.height / 2);
                        ctx.closePath();
                        ctx.fill();
                        
                        ctx.strokeStyle = '#ff6b81';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                        break;
                        
                    case 'saw':
                        ctx.save();
                        ctx.translate(obs.x, sy);
                        ctx.rotate(obs.angle * 3);
                        
                        ctx.fillStyle = '#ff6348';
                        for (let i = 0; i < 8; i++) {
                            ctx.rotate(Math.PI / 4);
                            ctx.fillRect(-3, -obs.radius, 6, obs.radius * 0.6);
                        }
                        
                        ctx.beginPath();
                        ctx.arc(0, 0, obs.radius * 0.35, 0, Math.PI * 2);
                        ctx.fillStyle = '#2f3542';
                        ctx.fill();
                        
                        ctx.restore();
                        break;
                        
                    case 'laser':
                        const isActive = obs.timer % obs.interval < 25;
                        if (isActive) {
                            ctx.shadowColor = '#ff3333';
                            ctx.shadowBlur = 15;
                            ctx.fillStyle = 'rgba(255, 50, 50, 0.9)';
                        } else {
                            ctx.shadowBlur = 0;
                            ctx.fillStyle = 'rgba(255, 50, 50, 0.15)';
                        }
                        ctx.fillRect(obs.x, sy, obs.width, obs.height);
                        ctx.shadowBlur = 0;
                        break;
                        
                    case 'missile':
                        obs.trail.forEach((t, i) => {
                            const ty = t.y - cameraY + 350;
                            ctx.fillStyle = `rgba(255, 100, 50, ${i / obs.trail.length * 0.4})`;
                            ctx.beginPath();
                            ctx.arc(t.x, ty, obs.radius * (i / obs.trail.length), 0, Math.PI * 2);
                            ctx.fill();
                        });
                        
                        ctx.fillStyle = '#ff6348';
                        ctx.beginPath();
                        ctx.arc(obs.x, sy, obs.radius, 0, Math.PI * 2);
                        ctx.fill();
                        
                        ctx.fillStyle = '#ffd700';
                        ctx.beginPath();
                        ctx.arc(obs.x, sy, obs.radius * 0.35, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                        
                    case 'bird':
                        ctx.save();
                        ctx.translate(obs.x, sy);
                        const facing = obs.vx > 0 ? 1 : -1;
                        ctx.scale(facing, 1);
                        
                        const wingY = Math.sin(obs.wingPhase) * 6;
                        
                        // 身体
                        ctx.fillStyle = '#74b9ff';
                        ctx.beginPath();
                        ctx.ellipse(0, 0, 12, 7, 0, 0, Math.PI * 2);
                        ctx.fill();
                        
                        // 翅膀
                        ctx.fillStyle = '#a29bfe';
                        ctx.beginPath();
                        ctx.moveTo(-5, -2);
                        ctx.lineTo(5, -2 + wingY);
                        ctx.lineTo(0, 5);
                        ctx.closePath();
                        ctx.fill();
                        
                        ctx.beginPath();
                        ctx.moveTo(-5, 2);
                        ctx.lineTo(5, 2 - wingY);
                        ctx.lineTo(0, -5);
                        ctx.closePath();
                        ctx.fill();
                        
                        ctx.restore();
                        break;
                }
            });
            
            // 绘制粒子
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            
            // 绘制气球
            const bsy = balloon.y - cameraY + 350;
            const wobble = Math.sin(balloon.wobblePhase) * balloon.wobbleAmount;
            
            // 无敌闪烁
            if (balloon.invincible > 0 && Math.floor(balloon.invincible / 6) % 2 === 0) {
                ctx.globalAlpha = 0.4;
            }
            
            // 光晕
            if (balloon.glow > 0) {
                ctx.shadowColor = '#00d4ff';
                ctx.shadowBlur = 15 + balloon.glow * 20;
            }
            
            // 气球主体（带缩放）
            const bs = balloon.scale;
            const gradient = ctx.createRadialGradient(
                balloon.x - 5, bsy - 5, 0,
                balloon.x, bsy, balloon.radius * bs
            );
            gradient.addColorStop(0, '#7ee8fa');
            gradient.addColorStop(0.6, '#00d4ff');
            gradient.addColorStop(1, '#0077b6');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.ellipse(
                balloon.x + wobble * 0.3, 
                bsy, 
                balloon.radius * bs, 
                balloon.radius * 1.15 * bs, 
                wobble * 0.02, 
                0, 
                Math.PI * 2
            );
            ctx.fill();
            
            ctx.shadowBlur = 0;
            
            // 高光
            ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
            ctx.beginPath();
            ctx.ellipse(
                balloon.x - 6 + wobble * 0.2, 
                bsy - 8, 
                6 * bs, 
                8 * bs, 
                -0.3, 
                0, 
                Math.PI * 2
            );
            ctx.fill();
            
            // 绳子（贝塞尔曲线）
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(balloon.x + wobble * 0.3, bsy + balloon.radius * 1.1 * bs);
            
            const ropeSwing = Math.sin(Date.now() * 0.003) * 8 + wind.current * 3;
            ctx.bezierCurveTo(
                balloon.x + ropeSwing, bsy + balloon.radius * 1.3 * bs,
                balloon.x + ropeSwing * 0.5, bsy + balloon.radius * 1.5 * bs,
                balloon.x, bsy + balloon.radius * 1.6 * bs + 15
            );
            ctx.stroke();
            
            // 底部小篮子
            ctx.fillStyle = 'rgba(200, 150, 100, 0.6)';
            ctx.fillRect(balloon.x - 6, bsy + balloon.radius * 1.6 * bs + 15, 12, 8);
            
            ctx.globalAlpha = 1;
            
            // 气压警告（低生命）
            if (lives === 1) {
                ctx.fillStyle = `rgba(255, 50, 50, ${0.15 + Math.sin(Date.now() * 0.008) * 0.1})`;
                ctx.fillRect(-offsetX / scale, -offsetY / scale, canvas.width / scale, canvas.height / scale);
            }
            
            ctx.restore();
        }
        
        // ========== 游戏循环 ==========
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // ========== 输入处理 ==========
        function getEventPos(e) {
            if (e.touches && e.touches.length > 0) {
                const rect = canvas.getBoundingClientRect();
                return {
                    x: e.touches[0].clientX - rect.left,
                    y: e.touches[0].clientY - rect.top
                };
            }
            return { x: e.offsetX, y: e.offsetY };
        }
        
        function handleStart(e) {
            if (gameState !== 'playing') return;
            e.preventDefault();
            isPressing = true;
        }
        
        function handleEnd(e) {
            e.preventDefault();
            isPressing = false;
        }
        
        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('mouseleave', handleEnd);
        
        canvas.addEventListener('touchstart', handleStart, {passive: false});
        canvas.addEventListener('touchend', handleEnd, {passive: false});
        canvas.addEventListener('touchcancel', handleEnd, {passive: false});
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && gameState === 'playing') {
                isPressing = true;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                isPressing = false;
            }
        });
        
        // 按钮
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('startBtn').addEventListener('touchend', (e) => {
            e.preventDefault();
            startGame();
        });
        
        document.getElementById('restartBtn').addEventListener('click', restartGame);
        document.getElementById('restartBtn').addEventListener('touchend', (e) => {
            e.preventDefault();
            restartGame();
        });
        
        // 初始化
        initStars();
        initClouds();
        resizeCanvas();
        gameLoop();
    </script>
</body>
</html>
