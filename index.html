<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>小猫气球大冒险 - Kitty Balloon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        
        #windIndicator { position: absolute; top: max(12px, env(safe-area-inset-top)); left: 15px; display: flex; align-items: center; gap: 6px; }
        #windArrow { font-size: 28px; transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); display: inline-block; filter: drop-shadow(0 0 8px rgba(100,200,255,0.4)); }
        #windText { color: rgba(255,255,255,0.85); font-size: clamp(11px, 3vw, 13px); font-weight: bold; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
        #windLabel { font-size: 9px; color: rgba(255,255,255,0.6); }
        
        #speedDisplay { position: absolute; top: max(12px, env(safe-area-inset-top)); right: 15px; text-align: right; }
        #speedValue { color: #00d4ff; font-size: clamp(16px, 4.5vw, 20px); font-weight: bold; text-shadow: 0 0 10px rgba(0,212,255,0.4); }
        #speedLabel { font-size: 9px; color: rgba(255,255,255,0.6); }
        
        #healthBar { position: absolute; top: max(50px, calc(env(safe-area-inset-top) + 35px)); left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
        .heart { font-size: clamp(22px, 6vw, 28px); transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); filter: drop-shadow(0 0 6px rgba(255,80,80,0.4)); }
        .heart.lost { opacity: 0.15; transform: scale(0.5) rotate(20deg); filter: grayscale(1); }
        .heart.hit { animation: heartHit 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        @keyframes heartHit { 0% { transform: scale(1); } 25% { transform: scale(1.5); } 50% { transform: scale(0.7); } 75% { transform: scale(1.2); } 100% { transform: scale(1); } }
        
        #score { position: absolute; top: max(90px, calc(env(safe-area-inset-top) + 75px)); left: 50%; transform: translateX(-50%); color: #ffd700; font-size: clamp(20px, 5.5vw, 26px); font-weight: bold; text-shadow: 0 0 12px rgba(255,215,0,0.35); letter-spacing: 3px; }
        #heightDisplay { position: absolute; top: max(120px, calc(env(safe-area-inset-top) + 105px)); left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.7); font-size: clamp(11px, 3vw, 13px); text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
        #sceneName { position: absolute; top: max(145px, calc(env(safe-area-inset-top) + 130px)); left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.5); font-size: clamp(10px, 2.8vw, 12px); letter-spacing: 2px; transition: opacity 0.5s; }
        
        #startScreen, #gameOverScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); pointer-events: all; z-index: 10; padding: 20px; backdrop-filter: blur(6px); }
        #gameOverScreen { display: none; }
        .title { font-size: clamp(32px, 9vw, 48px); color: #ffd93d; text-shadow: 0 0 25px rgba(255,217,61,0.45); margin-bottom: 8px; letter-spacing: 3px; text-align: center; }
        .subtitle { color: rgba(255,255,255,0.5); font-size: clamp(13px, 3.5vw, 17px); margin-bottom: 45px; letter-spacing: 2px; }
        .btn { padding: 16px 55px; background: linear-gradient(135deg, #ffd93d, #ff6b35); border: none; border-radius: 30px; color: #1a1a2e; font-size: clamp(17px, 5vw, 21px); font-weight: bold; cursor: pointer; pointer-events: all; transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s; box-shadow: 0 4px 25px rgba(255,217,61,0.25); -webkit-tap-highlight-color: transparent; }
        .btn:active { transform: scale(0.93); }
        .hint { margin-top: 40px; color: rgba(255,255,255,0.55); font-size: clamp(11px, 3vw, 13px); text-align: center; line-height: 2.3; max-width: 300px; }
        .finalScore { font-size: clamp(44px, 13vw, 60px); color: #ffd700; text-shadow: 0 0 25px rgba(255,215,0,0.4); margin-bottom: 8px; }
        .bestScore { color: rgba(255,255,255,0.5); font-size: clamp(13px, 3.5vw, 16px); margin-bottom: 40px; }
        
        .tutorial-hint { position: absolute; bottom: max(45px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.35); font-size: 12px; text-align: center; animation: pulse 3s infinite; white-space: nowrap; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
        @keyframes pulse { 0%, 100% { opacity: 0.35; } 50% { opacity: 0.7; } }
        
        #combo { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); color: #ff6b6b; font-size: clamp(28px, 8vw, 40px); font-weight: bold; opacity: 0; transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); text-shadow: 0 0 18px rgba(255,107,107,0.5); pointer-events: none; z-index: 5; }
        #combo.show { opacity: 1; transform: translate(-50%, -60%) scale(1.1); }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div id="windIndicator">
                <span id="windArrow">➡</span>
                <div><div id="windText">微风</div><div id="windLabel">风向</div></div>
            </div>
            <div id="speedDisplay"><div id="speedValue">1.0</div><div id="speedLabel">m/s</div></div>
            <div id="healthBar">
                <span class="heart" id="heart1">❤️</span>
                <span class="heart" id="heart2">❤️</span>
                <span class="heart" id="heart3">❤️</span>
            </div>
            <div id="score">0</div>
            <div id="heightDisplay">高度: 0m</div>
            <div id="sceneName">🏠 家门口</div>
            <div id="combo"></div>
            <div class="tutorial-hint" id="tutorialHint" style="display:none">按住上升 · 松手下降 · 左右滑动控制位置</div>
        </div>
        <div id="startScreen">
            <div class="title">🐱 小猫气球</div>
            <div class="subtitle">从家门口飘向宇宙</div>
            <button class="btn" id="startBtn">开始冒险</button>
            <div class="hint">
                🎈 按住屏幕 = 气球上升<br>
                ✋ 松开屏幕 = 气球缓慢下降<br>
                👆 左右滑动 = 控制小猫位置<br>
                ⚡ 越飞越高，速度会越来越快<br>
                ❤️ 碰到障碍损失生命，共3条命
            </div>
        </div>
        <div id="gameOverScreen">
            <div class="finalScore" id="finalScore">0</div>
            <div class="bestScore">最佳: <span id="bestScore">0</span></div>
            <button class="btn" id="restartBtn">再来一次</button>
            <div class="hint" style="margin-top:30px">💀 气球坠落了！<br>注意躲避障碍</div>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let GAME_WIDTH = 400, GAME_HEIGHT = 700, scale = 1, offsetX = 0, offsetY = 0;

function resizeCanvas() {
    const container = document.getElementById('gameContainer');
    const cw = container.clientWidth, ch = container.clientHeight;
    const ratio = GAME_WIDTH / GAME_HEIGHT, cr = cw / ch;
    if (cr > ratio) { scale = ch / GAME_HEIGHT; offsetX = (cw - GAME_WIDTH * scale) / 2; offsetY = 0; }
    else { scale = cw / GAME_WIDTH; offsetX = 0; offsetY = (ch - GAME_HEIGHT * scale) / 2; }
    canvas.width = cw; canvas.height = ch;
}
resizeCanvas(); window.addEventListener('resize', resizeCanvas);

function screenToGameX(sx) {
    let gx = (sx - offsetX) / scale;
    return Math.max(balloon.radius + 10, Math.min(GAME_WIDTH - balloon.radius - 10, gx));
}

// ========== 场景系统 ==========
const SCENES = [
    { h: 0,   name: '🏠 家门口' },
    { h: 100, name: '🌇 夕阳云层' },
    { h: 200, name: '🌙 月夜星空' },
    { h: 300, name: '⛈️ 雷暴云层' },
    { h: 400, name: '🌏 近地轨道' },
    { h: 500, name: '🚀 外太空' }
];

function lerp(a, b, t) { return a + (b - a) * t; }
function lerpColor(c1, c2, t) {
    return `rgb(${Math.round(lerp(c1[0],c2[0],t))},${Math.round(lerp(c1[1],c2[1],t))},${Math.round(lerp(c1[2],c2[2],t))})`;
}

function getSceneMix(h) {
    let idx = 0;
    for (let i = 0; i < SCENES.length - 1; i++) {
        if (h >= SCENES[i].h && h < SCENES[i+1].h) { idx = i; break; }
        if (h >= SCENES[SCENES.length-1].h) idx = SCENES.length - 2;
    }
    const s1 = SCENES[idx], s2 = SCENES[idx+1] || s1;
    const range = s2.h - s1.h;
    const t = range > 0 ? Math.max(0, Math.min(1, (h - s1.h) / range)) : 0;
    const smoothT = t * t * (3 - 2 * t);
    return { s1, s2, t: smoothT, idx };
}

// ========== 游戏状态 ==========
let gameState = 'menu', isPressing = false, score = 0;
let bestScore = localStorage.getItem('kittyBalloonBest2') || 0;
let combo = 0, comboTimer = 0;

const balloon = {
    x: 200, y: 450, targetX: 200, vx: 0,
    followSmooth: 0.15, followDamping: 0.88,
    riseBaseSpeed: 1.0, riseSpeed: 1.0, fallSpeed: 0.4,
    radius: 22,
    wobblePhase: 0, wobbleSpeed: 0.03, wobbleAmount: 2,
    glow: 0, scale: 1, targetScale: 1,
    invincible: 0
};

let height = 0, maxHeight = 0, speedMultiplier = 1;
function updateSpeed() {
    const segments = Math.floor(height / 100);
    speedMultiplier = 1 + segments * 0.12;
    balloon.riseSpeed = balloon.riseBaseSpeed * speedMultiplier;
}

const wind = { current: 0, target: 0, changeTimer: 0, changeInterval: 240, maxStrength: 1.5, smooth: 0.02 };
function updateWind() {
    wind.changeTimer++;
    if (wind.changeTimer >= wind.changeInterval) { wind.changeTimer = 0; wind.target = (Math.random() - 0.5) * 2 * wind.maxStrength; }
    wind.current += (wind.target - wind.current) * wind.smooth;
}
function getWindDescription(s) {
    const a = Math.abs(s);
    if (a < 0.2) return '无风'; if (a < 0.6) return '微风'; if (a < 1.0) return '和风';
    if (a < 1.5) return '强风'; return '狂风';
}

let cameraY = 0, cameraTargetY = 0, cameraSmooth = 0.06;
const BALLOON_SCREEN_Y = 400;

let lives = 3, maxLives = 3, invincibleTime = 0;
const INVINCIBLE_DURATION = 150;

let obstacles = [], particles = [], coins = [], stars = [], clouds = [], spawnTimer = 0, difficulty = 1;
let touchX = 200, isTouching = false;

let lightningTimer = 0, lightningFlash = 0, rainDrops = [];
let houseX = 120, treeX = 280;

function initStars() {
    stars = [];
    for (let i = 0; i < 150; i++) {
        stars.push({
            x: Math.random() * GAME_WIDTH,
            y: Math.random() * 6000 - 3000,
            size: Math.random() * 2.5 + 0.5,
            brightness: Math.random(),
            speed: Math.random() * 0.3 + 0.05,
            twinkleSpeed: Math.random() * 0.02 + 0.005
        });
    }
}
function initClouds() {
    clouds = [];
    for (let i = 0; i < 10; i++) {
        clouds.push({
            x: Math.random() * GAME_WIDTH,
            y: Math.random() * 4000 - 2000,
            width: 60 + Math.random() * 100,
            speed: 0.1 + Math.random() * 0.3,
            opacity: 0.05 + Math.random() * 0.1,
            dark: Math.random() > 0.5
        });
    }
}
function initRain() {
    rainDrops = [];
    for (let i = 0; i < 60; i++) {
        rainDrops.push({ x: Math.random() * GAME_WIDTH, y: Math.random() * GAME_HEIGHT, speed: 6 + Math.random() * 6, len: 8 + Math.random() * 12 });
    }
}

function spawnObstacle() {
    const types = ['spike','saw','laser','missile','bird'];
    const type = types[Math.floor(Math.random() * Math.min(types.length, Math.floor(difficulty / 2) + 2))];
    let obs = { type, y: cameraY - 80 - Math.random() * 60, active: true, passed: false };
    switch(type) {
        case 'spike': obs.x = 40 + Math.random() * 320; obs.width = 32; obs.height = 32; break;
        case 'saw': obs.x = 70 + Math.random() * 260; obs.radius = 20; obs.angle = 0; obs.orbitX = obs.x; obs.orbitRadius = 40 + Math.random() * 50; obs.orbitSpeed = 0.012 + Math.random() * 0.018; break;
        case 'laser': obs.x = 0; obs.width = GAME_WIDTH; obs.height = 3; obs.timer = 0; obs.interval = 120 + Math.random() * 80; break;
        case 'missile': obs.x = 25 + Math.random() * 350; obs.y = cameraY - 60; obs.radius = 6; obs.vx = 0; obs.vy = 1.0 + Math.random() * 0.8; obs.trail = []; break;
        case 'bird': obs.x = Math.random() < 0.5 ? -30 : GAME_WIDTH + 30; obs.y = cameraY - 80 - Math.random() * 250; obs.radius = 10; obs.vx = obs.x < 0 ? 1.0 + Math.random() * 0.8 : -1.0 - Math.random() * 0.8; obs.vy = 0; obs.wingPhase = Math.random() * Math.PI * 2; break;
    }
    obstacles.push(obs);
}
function spawnCoins() {
    const pattern = Math.floor(Math.random() * 4);
    const baseX = 70 + Math.random() * 260;
    for (let i = 0; i < 5; i++) {
        let x = baseX;
        if (pattern === 1) x = 50 + i * 75;
        if (pattern === 2) x = 200 + Math.sin(i * 0.8) * 90;
        if (pattern === 3) x = 80 + (i % 2) * 240;
        coins.push({ x: Math.max(20, Math.min(GAME_WIDTH - 20, x)), y: cameraY - 80 - i * 50, radius: 8, collected: false, bob: Math.random() * Math.PI * 2, glow: 0 });
    }
}

function createParticles(x, y, color, count = 10) {
    for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
        const speed = 1.5 + Math.random() * 3;
        particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1, decay: 0.012 + Math.random() * 0.015, color, size: 2 + Math.random() * 3, gravity: 0.06 });
    }
}
function createTrail(x, y, color) {
    particles.push({ x: x + (Math.random() - 0.5) * 6, y: y + (Math.random() - 0.5) * 6, vx: (Math.random() - 0.5) * 0.3, vy: 0.5 + Math.random() * 0.5, life: 0.5, decay: 0.025, color, size: 1.5 + Math.random() * 1.5, gravity: 0.01 });
}

function checkCollision(balloon, obj) {
    if (balloon.invincible > 0) return false;
    const dx = balloon.x - obj.x;
    const dy = (balloon.y - cameraY) - (obj.y - cameraY);
    const dist = Math.sqrt(dx * dx + dy * dy);
    return dist < balloon.radius + (obj.radius || obj.width / 2 || 12);
}

function startGame() {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('tutorialHint').style.display = 'block';
    setTimeout(() => { document.getElementById('tutorialHint').style.display = 'none'; }, 7000);
    gameState = 'playing'; resetGame();
}
function resetGame() {
    balloon.x = 200; balloon.y = 450; balloon.targetX = 200; balloon.vx = 0;
    balloon.glow = 0; balloon.scale = 1; balloon.targetScale = 1; balloon.invincible = 0; balloon.wobblePhase = 0;
    cameraY = balloon.y - BALLOON_SCREEN_Y; cameraTargetY = cameraY;
    height = 0; maxHeight = 0; speedMultiplier = 1;
    score = 0; combo = 0; comboTimer = 0; lives = 3; invincibleTime = 0; difficulty = 1;
    wind.current = 0; wind.target = 0; wind.changeTimer = 0;
    touchX = 200; isTouching = false;
    obstacles = []; particles = []; coins = [];
    spawnTimer = 0;
    initStars(); initClouds(); initRain();
    for (let i = 0; i < 3; i++) { spawnObstacle(); obstacles[obstacles.length - 1].y = -120 - i * 200; }
    spawnCoins(); coins.forEach(c => c.y = -100);
    updateHearts();
}
function restartGame() {
    document.getElementById('gameOverScreen').style.display = 'none';
    gameState = 'playing'; resetGame();
}
function takeDamage() {
    if (lives <= 0) return;
    lives--; invincibleTime = INVINCIBLE_DURATION; balloon.invincible = INVINCIBLE_DURATION;
    balloon.targetScale = 0.75; setTimeout(() => balloon.targetScale = 1, 250);
    createParticles(balloon.x, balloon.y - cameraY, '#ff4757', 15);
    updateHearts();
    if (lives <= 0) gameOver();
}
function updateHearts() {
    for (let i = 1; i <= 3; i++) {
        const heart = document.getElementById('heart' + i);
        if (i > lives) {
            if (!heart.classList.contains('lost')) {
                heart.classList.add('hit');
                setTimeout(() => { heart.classList.remove('hit'); heart.classList.add('lost'); }, 500);
            }
        } else { heart.classList.remove('lost', 'hit'); }
    }
}
function gameOver() {
    gameState = 'gameover';
    if (score > bestScore) { bestScore = score; localStorage.setItem('kittyBalloonBest2', bestScore); }
    document.getElementById('finalScore').textContent = Math.floor(score);
    document.getElementById('bestScore').textContent = Math.floor(bestScore);
    document.getElementById('gameOverScreen').style.display = 'flex';
    createParticles(balloon.x, balloon.y - cameraY, '#ff4757', 25);
}

function update() {
    if (gameState !== 'playing') return;
    difficulty = 1 + height / 600;
    updateWind(); updateSpeed();
    balloon.wobblePhase += balloon.wobbleSpeed;

    if (isPressing) {
        balloon.y -= balloon.riseSpeed;
        balloon.glow = Math.min(balloon.glow + 0.06, 1);
        balloon.targetScale = Math.min(balloon.targetScale + 0.004, 1.1);
        if (Math.random() < 0.25) createTrail(balloon.x, balloon.y + balloon.radius, 'rgba(255, 180, 60, 0.4)');
    } else {
        balloon.y += balloon.fallSpeed;
        balloon.glow = Math.max(balloon.glow - 0.08, 0);
        balloon.targetScale = Math.max(balloon.targetScale - 0.006, 0.95);
    }

    if (isTouching) balloon.targetX = touchX;
    balloon.vx = balloon.vx * balloon.followDamping + (balloon.targetX - balloon.x) * balloon.followSmooth;
    balloon.x += balloon.vx;
    balloon.x = Math.max(balloon.radius + 10, Math.min(GAME_WIDTH - balloon.radius - 10, balloon.x));

    const minY = cameraY - 200, maxY = cameraY + GAME_HEIGHT - 50;
    balloon.y = Math.max(minY, Math.min(maxY, balloon.y));

    balloon.scale += (balloon.targetScale - balloon.scale) * 0.1;

    height = Math.max(0, -balloon.y + 450);
    if (height > maxHeight) maxHeight = height;

    cameraTargetY = balloon.y - BALLOON_SCREEN_Y;
    cameraY += (cameraTargetY - cameraY) * cameraSmooth;

    score += 0.04 * speedMultiplier;

    if (invincibleTime > 0) { invincibleTime--; balloon.invincible--; }
    if (comboTimer > 0) {
        comboTimer--;
        if (comboTimer <= 0) { combo = 0; document.getElementById('combo').classList.remove('show'); }
    }

    spawnTimer++;
    const spawnRate = Math.max(45, 90 - difficulty * 4);
    if (spawnTimer > spawnRate) { spawnTimer = 0; spawnObstacle(); if (Math.random() < 0.2) spawnCoins(); }

    obstacles.forEach((obs, i) => {
        if (!obs.active) return;
        switch(obs.type) {
            case 'saw': obs.angle += obs.orbitSpeed; obs.x = obs.orbitX + Math.cos(obs.angle) * obs.orbitRadius; break;
            case 'laser': obs.timer++; obs.active = obs.timer % obs.interval < 20; break;
            case 'missile':
                obs.trail.push({x: obs.x, y: obs.y}); if (obs.trail.length > 6) obs.trail.shift();
                const mdx = balloon.x - obs.x, mdy = (balloon.y) - obs.y, mdist = Math.sqrt(mdx*mdx + mdy*mdy);
                if (mdist > 0) { obs.vx += (mdx / mdist) * 0.06; obs.vy += (mdy / mdist) * 0.06; }
                obs.vx = Math.max(-2, Math.min(2, obs.vx)); obs.vy = Math.max(-1.5, Math.min(2, obs.vy));
                obs.x += obs.vx; obs.y += obs.vy; break;
            case 'bird': obs.x += obs.vx; obs.wingPhase += 0.12; obs.y += Math.sin(obs.wingPhase) * 0.4; break;
        }
        if (checkCollision(balloon, obs)) {
            if (obs.type !== 'laser' || obs.active) { takeDamage(); obs.active = false; createParticles(obs.x, obs.y - cameraY, '#ff6348', 6); }
        }
        if (obs.y > cameraY + 900 || obs.x < -60 || obs.x > GAME_WIDTH + 60) {
            if (!obs.passed && obs.y > balloon.y && obs.active) score += 3;
            obstacles.splice(i, 1);
        }
    });

    coins.forEach((coin, i) => {
        if (coin.collected) return;
        coin.bob += 0.035; coin.glow = Math.sin(coin.bob) * 0.25 + 0.75;
        const dx = balloon.x - coin.x, dy = (balloon.y - cameraY) - (coin.y - cameraY), dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < balloon.radius + coin.radius + 4) {
            coin.collected = true; score += 10; combo++; comboTimer = 150;
            const comboEl = document.getElementById('combo');
            comboEl.textContent = combo + ' 连击!'; comboEl.classList.add('show');
            setTimeout(() => comboEl.classList.remove('show'), 900);
            createParticles(coin.x, coin.y - cameraY, '#ffd700', 5);
        }
        if (coin.y > cameraY + 900) coins.splice(i, 1);
    });

    particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.vy += p.gravity; p.life -= p.decay; p.vx *= 0.985; if (p.life <= 0) particles.splice(i, 1); });

    const mix = getSceneMix(height);
    stars.forEach(star => {
        const moveSpeed = isPressing ? star.speed * speedMultiplier * 1.5 : star.speed * 0.3;
        star.y += moveSpeed;
        star.brightness += Math.sin(Date.now() * star.twinkleSpeed) * 0.008;
        if (star.y > cameraY + 900) { star.y = cameraY - 300; star.x = Math.random() * GAME_WIDTH; }
    });
    clouds.forEach(cloud => {
        cloud.x += wind.current * 0.2;
        const moveSpeed = isPressing ? cloud.speed * speedMultiplier : cloud.speed * 0.2;
        cloud.y += moveSpeed;
        if (cloud.x > GAME_WIDTH + 120) cloud.x = -120;
        if (cloud.x < -120) cloud.x = GAME_WIDTH + 120;
        if (cloud.y > cameraY + 900) { cloud.y = cameraY - 400; cloud.x = Math.random() * GAME_WIDTH; }
    });

    if (mix.idx === 3 || (mix.idx === 2 && mix.t > 0.8) || (mix.idx === 3 && mix.t < 0.2)) {
        lightningTimer++;
        if (lightningTimer > 40 + Math.random() * 100) {
            lightningTimer = 0; lightningFlash = 8 + Math.random() * 12;
        }
        if (lightningFlash > 0) lightningFlash--;
    } else { lightningFlash = 0; }

    document.getElementById('score').textContent = Math.floor(score);
    document.getElementById('heightDisplay').textContent = '高度: ' + Math.floor(height) + 'm';
    document.getElementById('sceneName').textContent = mix.s1.name;
    document.getElementById('speedValue').textContent = balloon.riseSpeed.toFixed(1);

    const windArrow = document.getElementById('windArrow');
    const windDeg = wind.current > 0 ? 0 : 180;
    windArrow.style.transform = 'rotate(' + windDeg + 'deg)';
    const windStrength = Math.abs(wind.current);
    if (windStrength < 0.2) { windArrow.textContent = '·'; windArrow.style.opacity = '0.3'; }
    else if (wind.current > 0) { windArrow.textContent = '➡'; windArrow.style.opacity = Math.min(1, windStrength / 1.2); windArrow.style.color = '#74b9ff'; }
    else { windArrow.textContent = '⬅'; windArrow.style.opacity = Math.min(1, windStrength / 1.2); windArrow.style.color = '#74b9ff'; }
    document.getElementById('windText').textContent = getWindDescription(wind.current);
}

// 场景1：家门口（参考图1：明亮蓝天、粉紫渐变、绿色尖山、彩色气球、光点、斜线）
function drawScene1(alpha, height) {

        ctx.beginPath();
        ctx.moveTo(360 + i * 25, 0);

    // 光点（bokeh）
    ctx.fillStyle = 'rgba(255,255,255,0.5)';

        ctx.beginPath();

        ctx.fill();
    });

    // 远山（淡绿）
    ctx.fillStyle = '#81C784';
    ctx.beginPath();
    ctx.moveTo(0, 500 + shift);
    ctx.lineTo(50, 460 + shift); ctx.lineTo(100, 485 + shift);
    ctx.lineTo(150, 445 + shift); ctx.lineTo(210, 470 + shift);
    ctx.lineTo(270, 440 + shift); ctx.lineTo(330, 465 + shift);
    ctx.lineTo(400, 450 + shift); ctx.lineTo(400, 700 + shift); ctx.lineTo(0, 700 + shift);
    ctx.closePath(); ctx.fill();

    // 中山（中绿）
    ctx.fillStyle = '#66BB6A';
    ctx.beginPath();
    ctx.moveTo(0, 530 + shift);
    ctx.lineTo(70, 490 + shift); ctx.lineTo(140, 520 + shift);
    ctx.lineTo(200, 480 + shift); ctx.lineTo(280, 510 + shift);
    ctx.lineTo(340, 485 + shift); ctx.lineTo(400, 505 + shift);
    ctx.lineTo(400, 700 + shift); ctx.lineTo(0, 700 + shift);
    ctx.closePath(); ctx.fill();

    // 近山（深绿）
    ctx.fillStyle = '#43A047';
    ctx.beginPath();
    ctx.moveTo(0, 560 + shift);
    ctx.lineTo(80, 530 + shift); ctx.lineTo(160, 560 + shift);
    ctx.lineTo(240, 520 + shift); ctx.lineTo(320, 550 + shift);
    ctx.lineTo(400, 530 + shift); ctx.lineTo(400, 700 + shift); ctx.lineTo(0, 700 + shift);
    ctx.closePath(); ctx.fill();

    // 地面
    ctx.fillStyle = '#2E7D32';
    ctx.fillRect(0, 600 + shift, GAME_WIDTH, 200);

    // 彩色气球（带轻微摆动）
    const time = Date.now() * 0.001;
    const balloons = [
        {x: 70, y: 180, c: '#F44336', s: 1.0}, {x: 130, y: 140, c: '#FFEB3B', s: 0.9},
        {x: 195, y: 200, c: '#2196F3', s: 1.1}, {x: 260, y: 160, c: '#4CAF50', s: 0.95},
        {x: 325, y: 220, c: '#9C27B0', s: 1.05}, {x: 160, y: 260, c: '#FF9800', s: 0.85}
    ];
    balloons.forEach(b => {
        const by = b.y + shift * 0.3 + Math.sin(time + b.x) * 4;
        ctx.fillStyle = b.c;
        ctx.beginPath();
        ctx.ellipse(b.x, by, 11 * b.s, 14 * b.s, 0, 0, Math.PI * 2);
        ctx.fill();
        // 高光
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.beginPath();
        ctx.ellipse(b.x - 3, by - 4, 3.5 * b.s, 4.5 * b.s, -0.3, 0, Math.PI * 2);
        ctx.fill();
        // 结
        ctx.fillStyle = b.c;
        ctx.beginPath();
        ctx.moveTo(b.x - 2.5, by + 13 * b.s);
        ctx.lineTo(b.x + 2.5, by + 13 * b.s);
        ctx.lineTo(b.x, by + 17 * b.s);
        ctx.closePath(); ctx.fill();
        // 绳
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(b.x, by + 17 * b.s);
        ctx.quadraticCurveTo(b.x + 4, by + 40, b.x + Math.sin(time + b.x * 2) * 3, by + 65);
        ctx.stroke();
    });

    ctx.globalAlpha = 1;
}

        {x: 345, y: 290, r: 28, rot: -0.2, shape: [0.95,1.05,0.85,1.1,0.9,1.0,0.8,1.15]},
        {x: 55, y: 430, r: 16, rot: 0.6, shape: [1.1,0.9,1.0,0.85,1.05,0.95,0.9,1.1]},
        {x: 355, y: 125, r: 12, rot: -0.1, shape: [0.9,1.0,0.85,1.05,0.95,0.9,1.1,0.8]},
        {x: 205, y: 560, r: 32, rot: 0.4, shape: [1.0,0.9,1.1,0.85,1.05,0.95,0.9,1.15]},
        {x: 125, y: 630, r: 18, rot: -0.35, shape: [0.85,1.05,0.9,1.0,1.1,0.8,0.95,1.1]},
        {x: 310, y: 490, r: 14, rot: 0.15, shape: [1.05,0.9,1.0,0.85,1.1,0.95,0.9,1.0]},
        {x: 35, y: 310, r: 17, rot: 0.55, shape: [0.9,1.1,0.85,0.95,1.05,0.9,1.0,0.8]},
        {x: 375, y: 390, r: 21, rot: -0.25, shape: [1.0,0.85,1.05,0.9,1.1,0.95,0.85,1.05]}
    ];

    roids.forEach(a => {
        const ay = a.y + shift * 0.4;
        if (ay < -50 || ay > GAME_HEIGHT + 50) return;
        ctx.save();
        ctx.translate(a.x, ay);
        ctx.rotate(a.rot + shift * 0.0005); // 极缓慢自转

        // 不规则主体
        ctx.fillStyle = '#5C6BC0';
        ctx.beginPath();
        const sides = 8;
        for (let i = 0; i < sides; i++) {
            const angle = (Math.PI * 2 / sides) * i - 0.3;
            const rad = a.r * a.shape[i];
            const px = Math.cos(angle) * rad;
            const py = Math.sin(angle) * rad;
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath(); ctx.fill();

        // 陨石坑（深色圆形凹陷）
        ctx.fillStyle = '#3949AB';
        ctx.beginPath(); ctx.arc(-a.r * 0.35, -a.r * 0.25, a.r * 0.22, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(a.r * 0.3, a.r * 0.35, a.r * 0.18, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(-a.r * 0.15, a.r * 0.45, a.r * 0.14, 0, Math.PI * 2); ctx.fill();

        ctx.restore();
    });

    ctx.globalAlpha = 1;
}

// ========== 主背景绘制 ==========
function drawSceneBackground(mix) {
    const { idx, t } = mix;

    // 计算6个场景的alpha
    let a = [0,0,0,0,0,0];
    if (idx === 0) { a[0] = 1 - t; a[1] = t; }
    else if (idx === 1) { a[1] = 1 - t; a[2] = t; }
    else if (idx === 2) { a[2] = 1 - t; a[3] = t; }
    else if (idx === 3) { a[3] = 1 - t; a[4] = t; }
    else if (idx === 4) { a[4] = 1 - t; a[5] = t; }
    else if (idx >= 5) { a[5] = 1; }

    ctx.save();
    ctx.translate(offsetX, offsetY);
    ctx.scale(scale, scale);

    // 按场景顺序绘制（从远到近/从旧到新）
    drawScene1(a[0], height);
    drawScene2(a[1], height);
    drawScene3(a[2], height);
    drawScene4(a[3], height);
    drawScene5(a[4], height);
    drawScene6(a[5], height);

    // 闪电效果（叠加在所有场景之上）
    if (lightningFlash > 0) {
        ctx.globalAlpha = (lightningFlash / 20) * a[3];
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        ctx.strokeStyle = '#FFF';
        ctx.lineWidth = 2.5;
        ctx.shadowColor = '#FFF'; ctx.shadowBlur = 20;
        ctx.beginPath();
        let lx = 80 + Math.random() * 240, ly = -30;
        ctx.moveTo(lx, ly);
        for (let i = 0; i < 7; i++) {
            lx += (Math.random() - 0.5) * 70; ly += 50 + Math.random() * 50;
            ctx.lineTo(lx, ly);
        }
        ctx.stroke();
        ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    }

    ctx.restore();
}

// ========== 绘制小猫 + 气球 ==========
function drawKittyAndBalloon() {
    const bs = balloon.scale;
    const wobble = Math.sin(balloon.wobblePhase) * balloon.wobbleAmount;
    const bx = balloon.x + wobble * 0.2;
    const by = balloon.y - cameraY;
    const r = balloon.radius * bs;

    ctx.save();
    ctx.translate(offsetX, offsetY);
    ctx.scale(scale, scale);

    if (balloon.invincible > 0 && Math.floor(balloon.invincible / 8) % 2 === 0) ctx.globalAlpha = 0.35;

    if (balloon.glow > 0) {
        ctx.shadowColor = '#FF9F43';
        ctx.shadowBlur = 12 + balloon.glow * 18;
    }

    const bGrad = ctx.createRadialGradient(bx - 4, by - 6, 0, bx, by, r);
    bGrad.addColorStop(0, '#FFEAA7');
    bGrad.addColorStop(0.6, '#FFD93D');
    bGrad.addColorStop(1, '#F39C12');
    ctx.fillStyle = bGrad;
    ctx.beginPath();
    ctx.ellipse(bx, by, r, r * 1.12, wobble * 0.01, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
    ctx.beginPath();
    ctx.ellipse(bx - 5 + wobble * 0.1, by - 8, r * 0.22, r * 0.32, -0.3, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#E67E22';
    ctx.beginPath();
    ctx.moveTo(bx - 3, by + r * 1.08);
    ctx.lineTo(bx + 3, by + r * 1.08);
    ctx.lineTo(bx, by + r * 1.18);
    ctx.closePath(); ctx.fill();

    ctx.strokeStyle = 'rgba(140, 100, 60, 0.7)';
    ctx.lineWidth = 1.8;
    const ropeSwing = Math.sin(Date.now() * 0.002) * 3;
    const knotY = by + r * 1.15;
    const catY = by + r * 1.15 + 55;

    ctx.beginPath();
    ctx.moveTo(bx, knotY);
    ctx.bezierCurveTo(bx + ropeSwing, knotY + 12, bx - ropeSwing * 0.5, knotY + 28, bx, catY - 18);
    ctx.stroke();

    const cx = bx, cy = catY;
    const facing = balloon.vx > 0.5 ? 1 : (balloon.vx < -0.5 ? -1 : (Math.sin(Date.now() * 0.001) > 0 ? 1 : -1));
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(facing, 1);

    const tailWag = Math.sin(Date.now() * 0.008) * 0.4;
    ctx.strokeStyle = '#FF8C42'; ctx.lineWidth = 4; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-10, 5);
    ctx.quadraticCurveTo(-22, -5 + tailWag * 8, -26, -12 + tailWag * 12);
    ctx.stroke();

    ctx.fillStyle = '#FF8C42';
    ctx.beginPath(); ctx.ellipse(0, 0, 14, 18, 0, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#FFE5D1';
    ctx.beginPath(); ctx.ellipse(0, 3, 8, 11, 0, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#FF8C42';
    ctx.beginPath(); ctx.arc(0, -16, 12, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#FF8C42';
    ctx.beginPath(); ctx.moveTo(-10, -22); ctx.lineTo(-14, -32); ctx.lineTo(-4, -26); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(10, -22); ctx.lineTo(14, -32); ctx.lineTo(4, -26); ctx.closePath(); ctx.fill();

    ctx.fillStyle = '#FFB6A3';
    ctx.beginPath(); ctx.moveTo(-9, -24); ctx.lineTo(-12, -30); ctx.lineTo(-6, -27); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(9, -24); ctx.lineTo(12, -30); ctx.lineTo(6, -27); ctx.closePath(); ctx.fill();

    ctx.fillStyle = '#2D3436';
    ctx.beginPath(); ctx.arc(-4, -17, 2.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(4, -17, 2.2, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(-3, -18, 0.8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(5, -18, 0.8, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#FF7675';
    ctx.beginPath(); ctx.moveTo(0, -13); ctx.lineTo(-2, -10); ctx.lineTo(2, -10); ctx.closePath(); ctx.fill();

    ctx.strokeStyle = '#2D3436'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, -10); ctx.quadraticCurveTo(-3, -7, -5, -9); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -10); ctx.quadraticCurveTo(3, -7, 5, -9); ctx.stroke();

    ctx.strokeStyle = 'rgba(45,52,54,0.4)'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(-8, -13); ctx.lineTo(-18, -15); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-8, -11); ctx.lineTo(-18, -10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(8, -13); ctx.lineTo(18, -15); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(8, -11); ctx.lineTo(18, -10); ctx.stroke();

    ctx.fillStyle = '#FFE5D1';
    ctx.beginPath(); ctx.arc(0, -18, 3, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#FF8C42';
    ctx.beginPath(); ctx.ellipse(-8, 14, 5, 4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(8, 14, 5, 4, 0, 0, Math.PI * 2); ctx.fill();

    ctx.restore();
    ctx.restore();

    if (lives === 1) {
        ctx.fillStyle = `rgba(255, 50, 50, ${0.1 + Math.sin(Date.now() * 0.006) * 0.06})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
}

// ========== 绘制金币 & 障碍 & 粒子 ==========
function drawObjects() {
    ctx.save();
    ctx.translate(offsetX, offsetY);
    ctx.scale(scale, scale);

    coins.forEach(coin => {
        if (coin.collected) return;
        const bobY = Math.sin(coin.bob) * 3;
        const cy = coin.y - cameraY + bobY;
        ctx.fillStyle = `rgba(255, 215, 0, ${coin.glow * 0.15})`;
        ctx.beginPath(); ctx.arc(coin.x, cy, coin.radius + 5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffd700';
        ctx.beginPath(); ctx.arc(coin.x, cy, coin.radius, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffed4e';
        ctx.beginPath(); ctx.arc(coin.x - 1.5, cy - 1.5, coin.radius * 0.35, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#b8860b'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('★', coin.x, cy + 0.5);
    });

    obstacles.forEach(obs => {
        if (!obs.active && obs.type !== 'laser') return;
        const sy = obs.y - cameraY;
        switch(obs.type) {
            case 'spike':
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath(); ctx.moveTo(obs.x, sy - obs.height/2); ctx.lineTo(obs.x - obs.width/2, sy + obs.height/2); ctx.lineTo(obs.x + obs.width/2, sy + obs.height/2); ctx.closePath(); ctx.fill();
                ctx.strokeStyle = '#ff6b6b'; ctx.lineWidth = 1.5; ctx.stroke(); break;
            case 'saw':
                ctx.save(); ctx.translate(obs.x, sy); ctx.rotate(obs.angle * 3);
                ctx.fillStyle = '#e17055';
                for (let i = 0; i < 8; i++) { ctx.rotate(Math.PI/4); ctx.fillRect(-2.5, -obs.radius, 5, obs.radius * 0.55); }
                ctx.beginPath(); ctx.arc(0, 0, obs.radius * 0.3, 0, Math.PI * 2); ctx.fillStyle = '#2d3436'; ctx.fill();
                ctx.restore(); break;
            case 'laser':
                const isActive = obs.timer % obs.interval < 20;
                if (isActive) { ctx.shadowColor = '#ff3333'; ctx.shadowBlur = 12; ctx.fillStyle = 'rgba(255, 60, 60, 0.85)'; }
                else { ctx.shadowBlur = 0; ctx.fillStyle = 'rgba(255, 60, 60, 0.12)'; }
                ctx.fillRect(obs.x, sy, obs.width, obs.height); ctx.shadowBlur = 0; break;
            case 'missile':
                obs.trail.forEach((t, i) => {
                    const ty = t.y - cameraY;
                    ctx.fillStyle = `rgba(255, 100, 50, ${i / obs.trail.length * 0.35})`;
                    ctx.beginPath(); ctx.arc(t.x, ty, obs.radius * (i / obs.trail.length), 0, Math.PI * 2); ctx.fill();
                });
                ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.arc(obs.x, sy, obs.radius, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(obs.x, sy, obs.radius * 0.3, 0, Math.PI * 2); ctx.fill(); break;
            case 'bird':
                ctx.save(); ctx.translate(obs.x, sy); const facing = obs.vx > 0 ? 1 : -1; ctx.scale(facing, 1);
                const wingY = Math.sin(obs.wingPhase) * 5;
                ctx.fillStyle = '#74b9ff'; ctx.beginPath(); ctx.ellipse(0, 0, 10, 6, 0, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#a29bfe';
                ctx.beginPath(); ctx.moveTo(-4, -1.5); ctx.lineTo(4, -1.5 + wingY); ctx.lineTo(0, 4); ctx.closePath(); ctx.fill();
                ctx.beginPath(); ctx.moveTo(-4, 1.5); ctx.lineTo(4, 1.5 - wingY); ctx.lineTo(0, -4); ctx.closePath(); ctx.fill();
                ctx.restore(); break;
        }
    });

    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
    });
    ctx.globalAlpha = 1;
    ctx.restore();
}

// ========== 主绘制 ==========
function draw() {
    const mix = getSceneMix(height);
    drawSceneBackground(mix);
    drawObjects();
    drawKittyAndBalloon();
}

// ========== 游戏循环 ==========
function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

// ========== 输入处理 ==========
function handleStart(e) {
    if (gameState !== 'playing') return;
    e.preventDefault(); isPressing = true; isTouching = true;
    const pos = getEventPos(e);
    touchX = screenToGameX(pos.x);
    balloon.targetX = touchX;
}
function handleMove(e) {
    if (!isTouching || gameState !== 'playing') return;
    e.preventDefault();
    const pos = getEventPos(e);
    touchX = screenToGameX(pos.x);
    balloon.targetX = touchX;
}
function handleEnd(e) { e.preventDefault(); isPressing = false; isTouching = false; }

function getEventPos(e) {
    const rect = canvas.getBoundingClientRect();
    if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
    else if (e.changedTouches && e.changedTouches.length > 0) return { x: e.changedTouches[0].clientX - rect.left, y: e.changedTouches[0].clientY - rect.top };
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

canvas.addEventListener('mousedown', handleStart);
canvas.addEventListener('mousemove', handleMove);
canvas.addEventListener('mouseup', handleEnd);
canvas.addEventListener('mouseleave', handleEnd);
canvas.addEventListener('touchstart', handleStart, {passive: false});
canvas.addEventListener('touchmove', handleMove, {passive: false});
canvas.addEventListener('touchend', handleEnd, {passive: false});
canvas.addEventListener('touchcancel', handleEnd, {passive: false});

document.addEventListener('keydown', (e) => { if (e.code === 'Space' && gameState === 'playing') isPressing = true; });
document.addEventListener('keyup', (e) => { if (e.code === 'Space') isPressing = false; });

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('startBtn').addEventListener('touchend', (e) => { e.preventDefault(); startGame(); });
document.getElementById('restartBtn').addEventListener('click', restartGame);
document.getElementById('restartBtn').addEventListener('touchend', (e) => { e.preventDefault(); restartGame(); });

initStars(); initClouds(); initRain(); resizeCanvas(); gameLoop();
</script>
