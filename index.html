<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>时间气球 - Time Balloon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a1a;
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #0f0f23 0%, #1a1a3e 50%, #16213e 100%);
            overflow: hidden;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #windIndicator {
            position: absolute;
            top: max(12px, env(safe-area-inset-top));
            left: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        #windArrow {
            font-size: 28px;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: inline-block;
            filter: drop-shadow(0 0 8px rgba(100, 200, 255, 0.4));
        }
        
        #windText {
            color: rgba(255,255,255,0.7);
            font-size: clamp(11px, 3vw, 13px);
            font-weight: bold;
        }
        
        #windLabel {
            font-size: 9px;
            color: rgba(255,255,255,0.4);
        }
        
        #speedDisplay {
            position: absolute;
            top: max(12px, env(safe-area-inset-top));
            right: 15px;
            text-align: right;
        }
        
        #speedValue {
            color: #00d4ff;
            font-size: clamp(16px, 4.5vw, 20px);
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,212,255,0.4);
        }
        
        #speedLabel {
            font-size: 9px;
            color: rgba(255,255,255,0.4);
        }
        
        #healthBar {
            position: absolute;
            top: max(50px, calc(env(safe-area-inset-top) + 35px));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }
        
        .heart {
            font-size: clamp(22px, 6vw, 28px);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            filter: drop-shadow(0 0 6px rgba(255, 80, 80, 0.4));
        }
        
        .heart.lost {
            opacity: 0.15;
            transform: scale(0.5) rotate(20deg);
            filter: grayscale(1);
        }
        
        .heart.hit {
            animation: heartHit 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        @keyframes heartHit {
            0% { transform: scale(1); }
            25% { transform: scale(1.5); }
            50% { transform: scale(0.7); }
            75% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        #score {
            position: absolute;
            top: max(90px, calc(env(safe-area-inset-top) + 75px));
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: clamp(20px, 5.5vw, 26px);
            font-weight: bold;
            text-shadow: 0 0 12px rgba(255,215,0,0.35);
            letter-spacing: 3px;
        }
        
        #heightDisplay {
            position: absolute;
            top: max(120px, calc(env(safe-area-inset-top) + 105px));
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.45);
            font-size: clamp(11px, 3vw, 13px);
        }
        
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.88);
            pointer-events: all;
            z-index: 10;
            padding: 20px;
        }
        
        #gameOverScreen {
            display: none;
        }
        
        .title {
            font-size: clamp(36px, 10vw, 52px);
            color: #00d4ff;
            text-shadow: 0 0 25px rgba(0,212,255,0.45);
            margin-bottom: 8px;
            letter-spacing: 5px;
            text-align: center;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.45);
            font-size: clamp(13px, 3.5vw, 17px);
            margin-bottom: 55px;
            letter-spacing: 2px;
        }
        
        .btn {
            padding: 16px 55px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: clamp(17px, 5vw, 21px);
            font-weight: bold;
            cursor: pointer;
            pointer-events: all;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
            box-shadow: 0 4px 25px rgba(0,212,255,0.25);
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn:active {
            transform: scale(0.93);
        }
        
        .hint {
            margin-top: 45px;
            color: rgba(255,255,255,0.4);
            font-size: clamp(11px, 3vw, 13px);
            text-align: center;
            line-height: 2.3;
            max-width: 300px;
        }
        
        .finalScore {
            font-size: clamp(44px, 13vw, 60px);
            color: #ffd700;
            text-shadow: 0 0 25px rgba(255,215,0,0.4);
            margin-bottom: 8px;
        }
        
        .bestScore {
            color: rgba(255,255,255,0.45);
            font-size: clamp(13px, 3.5vw, 16px);
            margin-bottom: 40px;
        }
        
        .tutorial-hint {
            position: absolute;
            bottom: max(45px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.2);
            font-size: 12px;
            text-align: center;
            animation: pulse 3s infinite;
            white-space: nowrap;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.5; }
        }
        
        #combo {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff6b6b;
            font-size: clamp(28px, 8vw, 40px);
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-shadow: 0 0 18px rgba(255,107,107,0.5);
            pointer-events: none;
            z-index: 5;
        }
        
        #combo.show {
            opacity: 1;
            transform: translate(-50%, -60%) scale(1.1);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui">
            <div id="windIndicator">
                <span id="windArrow">➡</span>
                <div>
                    <div id="windText">微风</div>
                    <div id="windLabel">风向</div>
                </div>
            </div>
            
            <div id="speedDisplay">
                <div id="speedValue">1.0</div>
                <div id="speedLabel">m/s</div>
            </div>
            
            <div id="healthBar">
                <span class="heart" id="heart1">❤️</span>
                <span class="heart" id="heart2">❤️</span>
                <span class="heart" id="heart3">❤️</span>
            </div>
            
            <div id="score">0</div>
            <div id="heightDisplay">高度: 0m</div>
            
            <div id="combo"></div>
            
            <div class="tutorial-hint" id="tutorialHint" style="display:none">
                按住上升 · 松手下降 · 左右滑动控制位置
            </div>
        </div>
        
        <div id="startScreen">
            <div class="title">🎈 时间气球</div>
            <div class="subtitle">Time Balloon</div>
            <button class="btn" id="startBtn">开始游戏</button>
            <div class="hint">
                🎈 按住屏幕 = 气球上升<br>
                ✋ 松开屏幕 = 气球缓慢下降<br>
                👆 左右滑动 = 控制气球水平位置<br>
                ⚡ 越飞越高，速度会越来越快<br>
                ❤️ 碰到障碍损失生命，共3条命
            </div>
        </div>
        
        <div id="gameOverScreen">
            <div class="finalScore" id="finalScore">0</div>
            <div class="bestScore">最佳: <span id="bestScore">0</span></div>
            <button class="btn" id="restartBtn">再来一次</button>
            <div class="hint" style="margin-top:30px">
                💀 气球坠落了！<br>
                注意躲避障碍
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ========== 响应式画布 ==========
        let GAME_WIDTH = 400;
        let GAME_HEIGHT = 700;
        let scale = 1;
        let offsetX = 0;
        let offsetY = 0;
        
        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            const cw = container.clientWidth;
            const ch = container.clientHeight;
            const ratio = GAME_WIDTH / GAME_HEIGHT;
            const cr = cw / ch;
            
            if (cr > ratio) {
                scale = ch / GAME_HEIGHT;
                offsetX = (cw - GAME_WIDTH * scale) / 2;
                offsetY = 0;
            } else {
                scale = cw / GAME_WIDTH;
                offsetX = 0;
                offsetY = (ch - GAME_HEIGHT * scale) / 2;
            }
            
            canvas.width = cw;
            canvas.height = ch;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        function screenToGameX(sx) {
            return (sx - offsetX) / scale;
        }
        
        // ========== 游戏状态 ==========
        let gameState = 'menu';
        let isPressing = false;
        let score = 0;
        let bestScore = localStorage.getItem('timeBalloonBest7') || 0;
        let combo = 0;
        let comboTimer = 0;
        
        // ========== 气球属性（带轻微惯性的跟手）==========
        const balloon = {
            x: 200,
            y: 450,
            
            // 水平：带轻微贝塞尔惯性的跟手
            targetX: 200,
            vx: 0,
            followSmooth: 0.15,   // 跟手响应速度
            followDamping: 0.88,  // 轻微惯性阻尼
            
            // 垂直运动
            riseBaseSpeed: 1.0,
            riseSpeed: 1.0,
            fallSpeed: 0.4,
            
            radius: 22,
            
            // 动画
            wobblePhase: 0,
            wobbleSpeed: 0.03,
            wobbleAmount: 2,
            
            // 视觉
            glow: 0,
            scale: 1,
            targetScale: 1,
            
            // 无敌
            invincible: 0
        };
        
        // ========== 高度与速度系统 ==========
        let height = 0;
        let maxHeight = 0;
        let speedMultiplier = 1;
        
        function updateSpeed() {
            const segments = Math.floor(height / 100);
            speedMultiplier = 1 + segments * 0.15;
            balloon.riseSpeed = balloon.riseBaseSpeed * speedMultiplier;
        }
        
        // ========== 风向系统（只影响障碍移动，不影响气球）==========
        const wind = {
            current: 0,
            target: 0,
            changeTimer: 0,
            changeInterval: 240,
            maxStrength: 1.5,
            smooth: 0.02
        };
        
        function updateWind() {
            wind.changeTimer++;
            if (wind.changeTimer >= wind.changeInterval) {
                wind.changeTimer = 0;
                wind.target = (Math.random() - 0.5) * 2 * wind.maxStrength;
            }
            wind.current += (wind.target - wind.current) * wind.smooth;
        }
        
        function getWindDescription(strength) {
            const abs = Math.abs(strength);
            if (abs < 0.2) return '无风';
            if (abs < 0.6)
